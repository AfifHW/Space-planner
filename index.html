<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schematic Space Planner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: {} }
        }
    </script>
    
    <!-- React & ReactDOM (Menggunakan versi stabil cdnjs) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Fix untuk lucide-react UMD -->
    <script>
        window.react = window.React;
        globalThis.react = window.React;
    </script>
    
    <!-- Babel Standalone dengan preset react eksplisit -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
    
    <!-- Lucide Icons React -->
    <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.344.0/dist/umd/lucide-react.min.js" crossorigin></script>

    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
        #fallback-loading {
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; font-weight: bold;
            background: #f8fafc; color: #475569;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-20 print:bg-white print:pb-0">
    
    <!-- Root Element React -->
    <div id="root">
        <div id="fallback-loading">Memuat Aplikasi... (Jika macet, periksa koneksi internet)</div>
    </div>

    <!-- Perhatikan penambahan data-presets="react" -->
    <script type="text/babel" data-presets="react">
        // 1. Ekstrak Hooks dari React
        const { useState, useMemo, useEffect, useCallback, useRef } = window.React;
        
        // 2. Ekstrak Icon dari LucideReact secara aman
        const lucide = window.lucideReact || window.LucideReact || {};
        const {
            Users, Layout, Settings, Calculator, FileText, Plus, Trash2, Info,
            ChevronRight, ChevronDown, PlusCircle, X, Layers, Building2,
            PieChart, Palette, Settings2, AlertTriangle, CheckCircle2, LandPlot,
            Zap, HardHat, SlidersHorizontal, Undo2, Redo2, GripVertical, Copy,
            MapPin, Printer, FileSpreadsheet, ArrowUpDown, Save, FolderOpen,
            Building
        } = lucide;
        // Penanganan duplikasi alias di Lucide
        const MapIcon = lucide.Map; 
        const MapComponent = lucide.Map; 

        // 3. Error Boundary Component untuk menangkap error UI/Render
        class ErrorBoundary extends React.Component {
          constructor(props) { super(props); this.state = { hasError: false, error: null }; }
          static getDerivedStateFromError(error) { return { hasError: true, error }; }
          render() {
            if (this.state.hasError) {
              return (
                <div className="p-8 text-rose-600 bg-rose-50 min-h-screen font-mono">
                  <h1 className="text-2xl font-bold mb-4">Ups! Terjadi Kesalahan Render.</h1>
                  <pre className="bg-white p-4 rounded border border-rose-200 overflow-auto text-sm">{this.state.error.toString()}</pre>
                </div>
              );
            }
            return this.props.children;
          }
        }

        const ZONE_COLORS = [
          { id: 'blue', color: 'bg-blue-100 text-blue-700', border: 'border-blue-200' },
          { id: 'emerald', color: 'bg-emerald-100 text-emerald-700', border: 'border-emerald-200' },
          { id: 'purple', color: 'bg-purple-100 text-purple-700', border: 'border-purple-200' },
          { id: 'amber', color: 'bg-amber-100 text-amber-700', border: 'border-amber-200' },
          { id: 'rose', color: 'bg-rose-100 text-rose-700', border: 'border-rose-200' },
          { id: 'indigo', color: 'bg-indigo-100 text-indigo-700', border: 'border-indigo-200' },
          { id: 'slate', color: 'bg-slate-100 text-slate-700', border: 'border-slate-200' },
        ];

        const DEFAULT_REFERENCES = [];
        const DEFAULT_ROOM_NAMES = [];

        // Status Awal Aplikasi (Sudah mendukung Multi-Building)
        const INITIAL_APP_STATE = {
          projectName: 'Masterplan Pusat Pemerintahan',
          projectLocation: 'Ibu Kota Nusantara',
          landArea: 5000,
          kdbLimit: 60,
          ktbLimit: 70,
          kdhLimit: 20, 
          klbLimit: 3.0,
          maxFloorsLimit: 20, 
          
          factors: [
            { id: 'fac1', label: 'Sirkulasi', defaultVal: 25 },
            { id: 'fac2', label: 'Servis', defaultVal: 2.5 },
            { id: 'fac3', label: 'MEP', defaultVal: 2.5 }
          ],
          zones: [
            { id: 'z1', label: 'Publik', colorId: 'blue' },
            { id: 'z2', label: 'Semi-Publik', colorId: 'emerald' },
            { id: 'z3', label: 'Privat', colorId: 'purple' }
          ],
          
          buildings: [
            { id: 'b1', name: 'Gedung Utama', kdbFloorId: 'f1', ktbFloorId: '' },
            { id: 'b2', name: 'Gedung Penunjang', kdbFloorId: 'f3', ktbFloorId: '' }
          ],
          floors: [
            { id: 'f1', buildingId: 'b1', name: 'Lantai 1', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 25, fac2: 2.5, fac3: 2.5 } },
            { id: 'f2', buildingId: 'b1', name: 'Lantai 2', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 25, fac2: 2.5, fac3: 2.5 } },
            { id: 'f3', buildingId: 'b2', name: 'Lantai Dasar', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 20, fac2: 2.0, fac3: 2.0 } }
          ],
          rooms: [
            { id: 'r1', label: 'Lobby & Resepsionis', floorId: 'f1', zoneId: 'z1', count: 1, std: 60, notes: '' },
            { id: 'r2', label: 'Ruang Kepala', floorId: 'f2', zoneId: 'z3', count: 1, std: 40, notes: '' },
            { id: 'r3', label: 'Ruang Rapat Bersama', floorId: 'f3', zoneId: 'z2', count: 2, std: 50, notes: '' }
          ]
        };

        const useUndoableState = (initialState) => {
          const [state, setState] = useState(initialState);
          const [past, setPast] = useState([]);
          const [future, setFuture] = useState([]);

          const set = useCallback((newStateUpdater) => {
            setState(prev => {
              const nextState = typeof newStateUpdater === 'function' ? newStateUpdater(prev) : newStateUpdater;
              if (JSON.stringify(prev) !== JSON.stringify(nextState)) {
                setPast(p => {
                  const newPast = [...p, prev];
                  return newPast.length > 50 ? newPast.slice(newPast.length - 50) : newPast; 
                });
                setFuture([]); 
              }
              return nextState;
            });
          }, []);

          const undo = useCallback(() => {
            setPast(p => {
              if (p.length === 0) return p;
              const previous = p[p.length - 1];
              setState(currentState => {
                setFuture(f => [currentState, ...f]);
                return previous;
              });
              return p.slice(0, p.length - 1);
            });
          }, []);

          const redo = useCallback(() => {
            setFuture(f => {
              if (f.length === 0) return f;
              const next = f[0];
              setState(currentState => {
                setPast(p => [...p, currentState]);
                return next;
              });
              return f.slice(1);
            });
          }, []);

          return [state, set, undo, redo, past.length > 0, future.length > 0];
        };

        const App = () => {
          const [appState, setAppState, undo, redo, canUndo, canRedo] = useUndoableState(INITIAL_APP_STATE);
          
          const { projectName, projectLocation, landArea, kdbLimit, ktbLimit, kdhLimit, klbLimit, maxFloorsLimit, factors, zones, buildings, floors, rooms } = appState;

          // Global Setters
          const setProjectName = (val) => setAppState(prev => ({ ...prev, projectName: typeof val === 'function' ? val(prev.projectName) : val }));
          const setProjectLocation = (val) => setAppState(prev => ({ ...prev, projectLocation: typeof val === 'function' ? val(prev.projectLocation) : val }));
          const setLandArea = (val) => setAppState(prev => ({ ...prev, landArea: typeof val === 'function' ? val(prev.landArea) : val }));
          const setKdbLimit = (val) => setAppState(prev => ({ ...prev, kdbLimit: typeof val === 'function' ? val(prev.kdbLimit) : val }));
          const setKtbLimit = (val) => setAppState(prev => ({ ...prev, ktbLimit: typeof val === 'function' ? val(prev.ktbLimit) : val }));
          const setKdhLimit = (val) => setAppState(prev => ({ ...prev, kdhLimit: typeof val === 'function' ? val(prev.kdhLimit) : val }));
          const setKlbLimit = (val) => setAppState(prev => ({ ...prev, klbLimit: typeof val === 'function' ? val(prev.klbLimit) : val }));
          const setMaxFloorsLimit = (val) => setAppState(prev => ({ ...prev, maxFloorsLimit: typeof val === 'function' ? val(prev.maxFloorsLimit) : val }));
          const setFactors = (val) => setAppState(prev => ({ ...prev, factors: typeof val === 'function' ? val(prev.factors) : val }));
          const setZones = (val) => setAppState(prev => ({ ...prev, zones: typeof val === 'function' ? val(prev.zones) : val }));

          // UI State
          const [activeTab, setActiveTab] = useState('input');
          const [activeBuildingId, setActiveBuildingId] = useState(buildings[0]?.id || null);
          const [showZoneManager, setShowZoneManager] = useState(false);
          const [showFactorManager, setShowFactorManager] = useState(false);
          const [lastActiveFloorId, setLastActiveFloorId] = useState(null);
          const [collapsedFloors, setCollapsedFloors] = useState({});
          const [draggedFloorIdx, setDraggedFloorIdx] = useState(null);
          const [dragOverFloorIdx, setDragOverFloorIdx] = useState(null);
          const [draggedBuildingIdx, setDraggedBuildingIdx] = useState(null);
          const [dragOverBuildingIdx, setDragOverBuildingIdx] = useState(null);
          const [duplicateModal, setDuplicateModal] = useState({ isOpen: false, floorId: null, count: 1 });
          const [duplicateBuildingModal, setDuplicateBuildingModal] = useState({ isOpen: false, buildingId: null, count: 1 });
          const [reportSortBy, setReportSortBy] = useState('default');
          const [isExportingExcel, setIsExportingExcel] = useState(false);
          const [isPrinting, setIsPrinting] = useState(false);

          const [dialog, setDialog] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

          const showAlert = useCallback((message, title = "Informasi") => {
            setDialog({ isOpen: true, title, message, type: 'alert', onConfirm: null });
          }, []);

          const showConfirm = useCallback((message, onConfirm, title = "Konfirmasi") => {
            setDialog({ isOpen: true, title, message, type: 'confirm', onConfirm });
          }, []);

          const fileInputRef = useRef(null);
          const getZoneStyle = (colorId) => ZONE_COLORS.find(c => c.id === colorId) || ZONE_COLORS[0];

          useEffect(() => {
            if (!activeBuildingId && buildings.length > 0) {
              setActiveBuildingId(buildings[0].id);
            } else if (activeBuildingId && !buildings.find(b => b.id === activeBuildingId)) {
              setActiveBuildingId(buildings[0]?.id || null);
            }
          }, [buildings, activeBuildingId]);

          const referenceSuggestions = useMemo(() => Array.from(new Set(rooms.map(r => r.notes).filter(n => n && n.trim() !== ''))), [rooms]);
          const roomNameSuggestions = useMemo(() => Array.from(new Set(rooms.map(r => r.label).filter(n => n && n.trim() !== '' && n !== 'Ruang Baru'))), [rooms]);

          // STATS CALCULATION
          const stats = useMemo(() => {
            const safeNum = (val) => Number(val) || 0;
            const lArea = safeNum(landArea);
            const kLimit = safeNum(kdbLimit);
            const ktLimit = safeNum(ktbLimit);
            const klLimit = safeNum(klbLimit);

            let globalNettoTotal = 0;
            let globalBrutoTotal = 0;
            let globalFootprintArea = 0;
            let globalBasementFootprintArea = 0;
            const globalFactorAreas = {};
            factors.forEach(fac => globalFactorAreas[fac.id] = 0);

            const floorDetails = floors.map(f => {
              const nettoFloor = rooms.filter(r => r.floorId === f.id).reduce((acc, r) => acc + (safeNum(r.count) * safeNum(r.std)), 0);
              
              let totalMultiplier = 0;
              factors.forEach(fac => {
                const val = safeNum(f.factorValues?.[fac.id]);
                totalMultiplier += val;
                globalFactorAreas[fac.id] += (nettoFloor * val) / 100;
              });

              const brutoFloor = nettoFloor * (1 + totalMultiplier / 100);
              globalNettoTotal += nettoFloor;
              globalBrutoTotal += brutoFloor;
              
              return { ...f, netto: nettoFloor, bruto: brutoFloor, totalMultiplier };
            });

            const buildingDetails = buildings.map(b => {
              const bFloors = floorDetails.filter(fd => fd.buildingId === b.id);
              const bNetto = bFloors.reduce((acc, fd) => acc + fd.netto, 0);
              const bBruto = bFloors.reduce((acc, fd) => acc + fd.bruto, 0);
              const bFootprint = bFloors.find(fd => fd.id === b.kdbFloorId)?.bruto || 0;
              const bBasementFootprint = bFloors.find(fd => fd.id === b.ktbFloorId)?.bruto || 0;
              
              globalFootprintArea += bFootprint;
              globalBasementFootprintArea += bBasementFootprint;

              const heightAbove = bFloors.filter(f => !f.isBasement).reduce((acc, f) => acc + Math.abs(safeNum(f.floorHeight)), 0);
              const depthBelow = bFloors.filter(f => f.isBasement).reduce((acc, f) => acc + Math.abs(safeNum(f.floorHeight)), 0);

              const bZoneBreakdown = zones.map(z => {
                let zNettoArea = 0; let zBrutoArea = 0;
                rooms.filter(r => r.zoneId === z.id && bFloors.some(f => f.id === r.floorId)).forEach(r => {
                  const rNetto = safeNum(r.count) * safeNum(r.std);
                  zNettoArea += rNetto;
                  const floor = floors.find(f => f.id === r.floorId);
                  let multiplier = 0;
                  if (floor && floor.factorValues) { factors.forEach(fac => multiplier += safeNum(floor.factorValues[fac.id])); }
                  zBrutoArea += rNetto * (1 + multiplier / 100);
                });
                return { id: z.id, name: z.label, area: zNettoArea, brutoArea: zBrutoArea, style: getZoneStyle(z.colorId) };
              });

              return { ...b, floors: bFloors, netto: bNetto, bruto: bBruto, footprint: bFootprint, basementFootprint: bBasementFootprint, heightAbove, depthBelow, zoneBreakdown: bZoneBreakdown };
            });

            const currentKDB = lArea > 0 ? (globalFootprintArea / lArea) * 100 : 0;
            const currentKTB = lArea > 0 ? (globalBasementFootprintArea / lArea) * 100 : 0;
            const currentKLB = lArea > 0 ? globalBrutoTotal / lArea : 0;
            
            const maxAllowedKLBArea = lArea * klLimit;
            const maxAllowedKDBArea = (kLimit / 100) * lArea;
            const maxAllowedKTBArea = (ktLimit / 100) * lArea;
            const minRequiredKDHArea = (safeNum(kdhLimit) / 100) * lArea;
            
            const zoneBreakdown = zones.map(z => {
              let nettoArea = 0; let brutoArea = 0;
              rooms.filter(r => r.zoneId === z.id).forEach(r => {
                const rNetto = safeNum(r.count) * safeNum(r.std);
                nettoArea += rNetto;
                const floor = floors.find(f => f.id === r.floorId);
                let multiplier = 0;
                if (floor && floor.factorValues) { factors.forEach(fac => multiplier += safeNum(floor.factorValues[fac.id])); }
                brutoArea += rNetto * (1 + multiplier / 100);
              });
              return { id: z.id, name: z.label, area: nettoArea, brutoArea: brutoArea, style: getZoneStyle(z.colorId) };
            });

            return { 
              nettoTotal: globalNettoTotal, 
              brutoTotal: globalBrutoTotal, 
              footprint: globalFootprintArea,
              basementFootprint: globalBasementFootprintArea,
              floorDetails, 
              buildingDetails,
              zoneBreakdown,
              currentKDB, currentKTB, currentKLB,
              maxAllowedKLBArea, maxAllowedKDBArea, maxAllowedKTBArea, minRequiredKDHArea,
              factorAreas: globalFactorAreas
            };
          }, [rooms, floors, buildings, zones, factors, landArea, ktbLimit, kdhLimit, klbLimit, kdbLimit]);

          // ACTIONS
          const addBuilding = () => {
            const newId = `b${Date.now()}`;
            const newFloorId = `f${Date.now()}`;
            const initialFactors = {};
            factors.forEach(fac => initialFactors[fac.id] = fac.defaultVal || 0);

            setAppState(prev => ({
              ...prev,
              buildings: [...prev.buildings, { id: newId, name: `Gedung ${prev.buildings.length + 1}`, kdbFloorId: newFloorId, ktbFloorId: '' }],
              floors: [...prev.floors, { id: newFloorId, buildingId: newId, name: 'Lantai Dasar', isBasement: false, floorHeight: 4.0, factorValues: initialFactors }]
            }));
            setActiveBuildingId(newId);
          };

          const updateBuilding = (id, field, value) => {
            setAppState(prev => ({
              ...prev,
              buildings: prev.buildings.map(b => b.id === id ? { ...b, [field]: value } : b)
            }));
          };

          const removeBuilding = (id) => {
            if (buildings.length <= 1) {
              showAlert("Proyek harus memiliki setidaknya 1 Gedung.", "Gagal Menghapus");
              return;
            }
            showConfirm("Hapus gedung beserta seluruh lantai dan ruangannya?", () => {
              setAppState(prev => {
                const remainingFloors = prev.floors.filter(f => f.buildingId !== id);
                const validFloorIds = remainingFloors.map(f => f.id);
                return {
                  ...prev,
                  buildings: prev.buildings.filter(b => b.id !== id),
                  floors: remainingFloors,
                  rooms: prev.rooms.filter(r => validFloorIds.includes(r.floorId))
                }
              });
            }, "Hapus Gedung");
          };

          const addFactor = () => {
            const newId = `fac${Date.now()}`;
            setAppState(prev => ({
              ...prev,
              factors: [...prev.factors, { id: newId, label: 'Faktor Baru', defaultVal: 0 }],
              floors: prev.floors.map(f => ({ ...f, factorValues: { ...f.factorValues, [newId]: 0 } }))
            }));
          };

          const removeFactor = (id) => setFactors(prev => prev.filter(fac => fac.id !== id));
          const updateFactor = (id, label) => setFactors(prev => prev.map(fac => fac.id === id ? { ...fac, label } : fac));
          const updateFactorDefault = (id, defaultVal) => {
            setFactors(prev => prev.map(fac => fac.id === id ? { ...fac, defaultVal: Number(defaultVal) } : fac));
          };

          const applyFactorToAllFloors = (factorId) => {
            const factor = factors.find(f => f.id === factorId);
            if (!factor) return;
            const val = factor.defaultVal;
            showConfirm(`Terapkan nilai persentase ${val}% untuk "${factor.label}" ke SEMUA lantai di SEMUA gedung? (Nilai manual sebelumnya akan tertimpa).`, () => {
              setAppState(prev => ({
                ...prev,
                floors: prev.floors.map(f => ({ ...f, factorValues: { ...f.factorValues, [factorId]: val } }))
              }));
            }, "Terapkan Global");
          };

          const updateFloorFactor = (floorId, factorId, value) => {
            setAppState(prev => ({
              ...prev,
              floors: prev.floors.map(f => f.id === floorId ? { ...f, factorValues: { ...f.factorValues, [factorId]: value } } : f)
            }));
          };

          const addZone = () => {
            const newId = `z${Date.now()}`;
            setZones(prev => [...prev, { id: newId, label: 'Zona Baru', colorId: 'slate' }]);
          };

          const removeZone = (id) => {
            if (zones.length <= 1) return;
            setAppState(prev => {
              const newZones = prev.zones.filter(z => z.id !== id);
              return { ...prev, zones: newZones, rooms: prev.rooms.map(r => r.zoneId === id ? { ...r, zoneId: newZones[0].id } : r) };
            });
          };

          const updateZone = (id, field, value) => setZones(prev => prev.map(z => z.id === id ? { ...z, [field]: value } : z));

          const addFloor = useCallback((position = 'bottom') => {
            if(!activeBuildingId) return;
            const bFloors = floors.filter(f => f.buildingId === activeBuildingId);
            if (bFloors.length >= (Number(maxFloorsLimit) || 1)) return;

            const newId = `f${Date.now()}`;
            const initialFactors = {};
            factors.forEach(fac => initialFactors[fac.id] = fac.defaultVal || 0);
            
            setAppState(prev => {
              let maxLantai = 0;
              prev.floors.filter(f => f.buildingId === activeBuildingId).forEach(f => {
                const match = f.name.match(/^Lantai\s(\d+)$/i);
                if (match) {
                  const num = parseInt(match[1], 10);
                  if (num > maxLantai) maxLantai = num;
                }
              });
              
              const newFloor = { id: newId, buildingId: activeBuildingId, name: `Lantai ${maxLantai + 1}`, isBasement: false, floorHeight: 4.0, factorValues: initialFactors };
              const newFloors = [...prev.floors];
              
              if (position === 'top') {
                const firstIdx = newFloors.findIndex(f => f.buildingId === activeBuildingId);
                newFloors.splice(firstIdx >= 0 ? firstIdx : 0, 0, newFloor);
              } else {
                newFloors.push(newFloor);
              }
              return { ...prev, floors: newFloors };
            });
          }, [floors, maxFloorsLimit, factors, activeBuildingId, setAppState]);

          const removeFloor = (id) => {
            const floor = floors.find(f => f.id === id);
            const bFloors = floors.filter(f => f.buildingId === floor.buildingId);
            if (bFloors.length <= 1) { showAlert("Gedung harus memiliki setidaknya 1 Lantai.", "Gagal Menghapus"); return; }
            
            setAppState(prev => {
              const newFloors = prev.floors.filter(f => f.id !== id);
              return {
                ...prev,
                floors: newFloors,
                rooms: prev.rooms.filter(r => r.floorId !== id),
                buildings: prev.buildings.map(b => {
                   if(b.id === floor.buildingId) {
                      return {
                         ...b,
                         kdbFloorId: b.kdbFloorId === id ? newFloors.find(f=>f.buildingId===b.id)?.id : b.kdbFloorId,
                         ktbFloorId: b.ktbFloorId === id ? '' : b.ktbFloorId
                      }
                   }
                   return b;
                })
              };
            });
          };

          const updateFloorConfig = (id, field, value) => {
            setAppState(prev => ({
              ...prev,
              floors: prev.floors.map(f => {
                if (f.id === id) {
                  const updatedFloor = { ...f, [field]: value };
                  if (field === 'name') {
                    const lowerName = String(value).toLowerCase();
                    if (lowerName.includes('basement') || lowerName.includes('bawah') || lowerName.includes('lower')) {
                      updatedFloor.isBasement = true;
                    } else if (lowerName.includes('lantai') || lowerName.includes('dasar') || lowerName.includes('atap')) {
                      updatedFloor.isBasement = false;
                    }
                  }
                  if (field === 'floorHeight') {
                    if (Number(value) < 0) updatedFloor.isBasement = true;
                    else if (Number(value) > 0 && updatedFloor.name.includes('Lantai')) updatedFloor.isBasement = false;
                  }
                  return updatedFloor;
                }
                return f;
              })
            }));
          };

          const confirmDuplicate = () => {
            const { floorId, count } = duplicateModal;
            if (!floorId || count < 1) return;

            setAppState(prev => {
              const floorToCopy = prev.floors.find(f => f.id === floorId);
              if (!floorToCopy) return prev;

              const bFloors = prev.floors.filter(f => f.buildingId === floorToCopy.buildingId);
              const maxAllowed = (Number(prev.maxFloorsLimit) || 1) - bFloors.length;
              const actualCount = Math.min(count, maxAllowed);
              
              if (actualCount <= 0) return prev;

              const oldFloorRooms = prev.rooms.filter(r => r.floorId === floorId);

              if (isUnchanged) floorRooms.reverse();

              <input type="file" accept=".json" ref={fileInputRef} onChange={handleLoadProject} className="hidden" />

              {/* NAVBAR */}
              <div className="bg-white border-b border-slate-200 sticky top-0 z-30 px-4 py-4 md:px-8 shadow-sm print:hidden">
                <div className="max-w-6xl mx-auto flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div className="flex items-center gap-3">
                    <div className="bg-indigo-600 p-2 rounded-lg text-white">
                      {Building2 && <Building2 className="w-6 h-6" />}
                    </div>
                    <div>
                      <h1 className="text-xl font-bold text-slate-800">Schematic Space Planner</h1>
                      <p className="text-xs text-slate-500 font-medium tracking-tight">Skematik Perhitungan Intensitas Lahan dan Program Ruang</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-4">
                    <div className="flex items-center gap-2 border-r border-slate-200 pr-4">
                      <button onClick={() => fileInputRef.current.click()} title="Buka Proyek (.json)" className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors">
                        {FolderOpen && <FolderOpen className="w-4 h-4" />} Buka
                      </button>
                      <button onClick={handleSaveProject} title="Simpan Proyek (.json)" className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-slate-600 hover:bg-slate-100 hover:text-indigo-600 transition-colors">
                        {Save && <Save className="w-4 h-4" />} Simpan
                      </button>
                    </div>
                    <div className="flex items-center gap-1 border-r border-slate-200 pr-4">
                      <button onClick={undo} disabled={!canUndo} className={`p-2 rounded-lg transition-colors ${canUndo ? 'text-slate-700 hover:bg-slate-100 cursor-pointer' : 'text-slate-300 cursor-not-allowed'}`}>{Undo2 && <Undo2 className="w-5 h-5" />}</button>
                      <button onClick={redo} disabled={!canRedo} className={`p-2 rounded-lg transition-colors ${canRedo ? 'text-slate-700 hover:bg-slate-100 cursor-pointer' : 'text-slate-300 cursor-not-allowed'}`}>{Redo2 && <Redo2 className="w-5 h-5" />}</button>
                    </div>
                    <div className="flex bg-slate-100 p-1 rounded-xl">
                      <button onClick={() => setActiveTab('input')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'input' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Rancangan</button>
                      <button onClick={() => setActiveTab('report')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${activeTab === 'report' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Analisis & Laporan</button>
                    </div>
                  </div>
                </div>
              </div>

              <main id="printable-report" className="flex-grow max-w-6xl mx-auto w-full p-4 md:p-8 print:p-0 print:max-w-none">
                
                {/* HEADER PROYEK */}
                <div className={`mb-8 border-b-2 pb-4 pt-2 flex flex-col md:flex-row md:items-start justify-between gap-4 ${activeTab === 'report' ? 'border-slate-900 print:border-black' : 'border-slate-200'}`}>
                  <div className="flex-1 w-full relative group">
                    {activeTab === 'input' ? (
                      <React.Fragment>
                        <div className="relative">
                          <input 
                            type="text" 
                            value={projectName} 
                            onChange={(e) => setProjectName(e.target.value)} 
                            placeholder="NAMA PROYEK MASTERPLAN..." 
                            className="w-full bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-indigo-500 text-3xl md:text-4xl font-black uppercase text-slate-900 placeholder:text-slate-300 focus:ring-0 p-0 pb-1 outline-none transition-colors" 
                          />
                        </div>
                        <div className="flex items-center gap-2 mt-2">
                          {MapPin && <MapPin className="w-4 h-4 text-slate-400 shrink-0" />}
                          <input 
                            type="text" 
                            value={projectLocation} 
                            onChange={(e) => setProjectLocation(e.target.value)} 
                            placeholder="Lokasi Proyek..." 
                            className="w-full bg-transparent border-b-2 border-transparent hover:border-slate-200 focus:border-indigo-500 text-sm font-bold text-slate-500 uppercase tracking-widest placeholder:text-slate-300 focus:ring-0 p-0 pb-1 outline-none transition-colors" 
                          />
                        </div>
                        <div className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-[10px] font-bold text-slate-400 pointer-events-none transition-opacity uppercase tracking-widest bg-white/80 px-2 py-1 rounded print:hidden">
                          Klik untuk Edit
                        </div>
                      </React.Fragment>
                    ) : (
                      <React.Fragment>
                        <div className="relative">
                          <div className="w-full bg-transparent border-b-2 border-transparent text-3xl md:text-4xl font-black uppercase text-slate-900 p-0 pb-1 print:text-black">
                            {projectName || 'Laporan Masterplan'}
                          </div>
                        </div>
                        <div className="flex items-center gap-2 mt-2">
                          {MapPin && <MapPin className="w-4 h-4 text-slate-500 shrink-0 print:text-black" />}
                          <div className="w-full bg-transparent border-b-2 border-transparent text-sm font-bold text-slate-500 uppercase tracking-widest p-0 pb-1 print:text-black">
                            {projectLocation || 'Lokasi Belum Ditentukan'}
                          </div>
                        </div>
                      </React.Fragment>
                    )}
                  </div>
                  
                  {activeTab === 'report' && (
                    <div className="flex items-center gap-3 print:hidden shrink-0" data-html2canvas-ignore="true">
                      <button onClick={handleExportExcel} disabled={isExportingExcel} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors shadow-sm ${isExportingExcel ? 'bg-emerald-400 text-white cursor-wait' : 'bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100'}`}>
                        {FileSpreadsheet && <FileSpreadsheet className={`w-4 h-4 ${isExportingExcel ? 'animate-pulse' : ''}`} />} {isExportingExcel ? 'Menyiapkan...' : 'Excel (.xlsx)'}
                      </button>
                      <button onClick={handlePrintPDF} disabled={isPrinting} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-colors shadow-sm ${isPrinting ? 'bg-indigo-400 text-white cursor-wait' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                        {Printer && <Printer className={`w-4 h-4 ${isPrinting ? 'animate-pulse' : ''}`} />} {isPrinting ? 'Memproses...' : 'Cetak PDF'}
                      </button>
                    </div>
                  )}
                </div>

                {/* GLOBAL DASHBOARD */}
                <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-8 print:mb-6">
                  <ComplianceBadge 
                    label="KDB Kawasan" 
                    isOk={stats.currentKDB <= (Number(kdbLimit)||0)} 
                    current={stats.currentKDB} 
                    limit={kdbLimit} 
                    unit="%" 
                    subText={
                      <React.Fragment>
                        <div className="mb-0.5">Terdesain: {stats.footprint.toFixed(1)} m²</div>
                        <div>Maks: {stats.maxAllowedKDBArea.toFixed(1)} m²</div>
                      </React.Fragment>
                    } 
                  />
                  <ComplianceBadge 
                    label="KTB Kawasan" 
                    isOk={stats.currentKTB <= (Number(ktbLimit)||0)} 
                    current={stats.currentKTB} 
                    limit={ktbLimit} 
                    unit="%" 
                    subText={
                      <React.Fragment>
                        <div className="mb-0.5">Terdesain: {stats.basementFootprint.toFixed(1)} m²</div>
                        <div>Maks: {stats.maxAllowedKTBArea.toFixed(1)} m²</div>
                      </React.Fragment>
                    } 
                  />
                  <div className="p-4 rounded-xl border flex flex-col justify-between transition-all bg-emerald-50 border-emerald-100 text-emerald-800 print:border-slate-300 print:bg-transparent">
                    <div className="flex items-center justify-between mb-2"><span className="text-[10px] font-black uppercase tracking-wider opacity-70 print:text-black">KDH (Area Hijau)</span>{Info && <Info className="w-4 h-4 print:text-black" />}</div>
                    <div className="flex flex-col"><div className="flex items-baseline gap-1"><span className="text-xl font-black print:text-black">{kdhLimit}</span><span className="text-[10px] font-bold opacity-60 print:text-black">% MIN</span></div><div className="text-[9px] font-bold mt-1 opacity-80 uppercase tracking-tighter leading-tight print:text-black">Min: {stats.minRequiredKDHArea.toFixed(1)} m²</div></div>
                    <div className="mt-2 text-[10px] font-bold italic print:text-black">CEK DESAIN</div>
                  </div>
                  <ComplianceBadge 
                    label="KLB (FAR) Kawasan" 
                    isOk={stats.currentKLB <= (Number(klbLimit)||0)} 
                    current={stats.currentKLB} 
                    limit={klbLimit} 
                    subText={
                      <React.Fragment>
                        <div className="mb-0.5">Terdesain: {stats.brutoTotal.toFixed(1)} m²</div>
                        <div>Maks: {stats.maxAllowedKLBArea.toFixed(1)} m²</div>
                      </React.Fragment>
                    } 
                  />
                  
                  <div className="bg-slate-900 p-4 rounded-xl text-white flex flex-col justify-between shadow-lg col-span-2 print:bg-white print:text-black print:border print:border-slate-300 print:shadow-none">
                    <div className="flex items-center justify-between opacity-70"><span className="text-[10px] font-black uppercase tracking-wider print:text-black">TOTAL TERDESAIN</span>{FileText && <FileText className="w-4 h-4 print:hidden" />}</div>
                    <div className="text-2xl font-black mt-1">{stats.brutoTotal.toFixed(1)} <span className="text-xs font-normal">m²</span></div>
                    <div className={`mt-2 text-[9px] font-bold uppercase tracking-tighter print:text-black flex justify-between items-center gap-2 ${stats.brutoTotal > stats.maxAllowedKLBArea ? 'text-rose-400' : 'text-indigo-300'}`}>
                      <span className="truncate">Sisa KLB: {(stats.maxAllowedKLBArea - stats.brutoTotal).toFixed(1)} m²</span>
                      <span className={`px-1.5 py-0.5 rounded border shrink-0 ${stats.brutoTotal > stats.maxAllowedKLBArea ? 'bg-rose-950/50 border-rose-500/20' : 'bg-white/10 border-white/5'}`}>
                        {stats.maxAllowedKLBArea > 0 ? ((stats.brutoTotal / stats.maxAllowedKLBArea) * 100).toFixed(1) : 0}% Terdesain
                      </span>
                    </div>
                  </div>
                </div>

                {activeTab === 'input' ? (
                  <div className="space-y-6">
                    
                    <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                      <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">{LandPlot && <LandPlot className="w-5 h-5 text-indigo-600" />} Parameter Lahan & Acuan Tapak</h3>
                      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6">
                        <div className="space-y-4">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Luas Lahan (m²)</label>
                            <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-black text-indigo-600" />
                          </div>
                        </div>
                        <div className="space-y-4">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Maks KDB (%)</label>
                            <input type="number" value={kdbLimit} onChange={(e) => setKdbLimit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-bold" />
                          </div>
                        </div>
                        <div className="space-y-4">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Maks KTB (%)</label>
                            <input type="number" value={ktbLimit} onChange={(e) => setKtbLimit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-bold" />
                          </div>
                        </div>
                        <div className="space-y-4">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Min KDH (%)</label>
                            <input type="number" value={kdhLimit} onChange={(e) => setKdhLimit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-bold text-emerald-700" />
                          </div>
                        </div>
                        <div className="space-y-4">
                          <div>
                            <label className="text-[10px] font-bold text-slate-400 uppercase block mb-1">Maks KLB</label>
                            <input type="number" step="0.1" value={klbLimit} onChange={(e) => setKlbLimit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 font-bold" />
                            <div className="text-[9px] mt-1.5 text-indigo-500 font-bold italic tracking-tighter uppercase">
                              *Est. Jml Lantai: {Number(kdbLimit) > 0 ? (Number(klbLimit) / (Number(kdbLimit) / 100)).toFixed(1) : 0} lt
                            </div>
                          </div>
                        </div>
                        <div className="col-span-2 md:col-span-3 lg:col-span-5">
                            <div className="bg-slate-100 p-4 rounded-xl text-[10px] text-slate-500 font-medium">
                                Parameter ini berlaku untuk <strong className="text-slate-700">keseluruhan luas lahan</strong>. Footprint KDB dan KTB akan dihitung dari gabungan lantai dasar dan basement dari <strong className="text-indigo-600">seluruh gedung</strong> yang ada di dalam masterplan ini.
                            </div>
                        </div>
                      </div>
                    </div>

                    <div className="flex gap-2 flex-wrap">
                      <button onClick={() => setShowFactorManager(!showFactorManager)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${showFactorManager ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>{SlidersHorizontal && <SlidersHorizontal className="w-4 h-4" />} Atur Faktor</button>
                      <button onClick={() => setShowZoneManager(!showZoneManager)} className={`flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold transition-all ${showZoneManager ? 'bg-indigo-600 text-white' : 'bg-white text-slate-600 border border-slate-200'}`}>{Palette && <Palette className="w-4 h-4" />} Atur Zoning</button>
                    </div>

                    {showFactorManager && (
                      <div className="bg-white p-6 rounded-2xl border-2 border-indigo-100 shadow-md">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2">{SlidersHorizontal && <SlidersHorizontal className="w-5 h-5 text-indigo-600" />} Manajemen Faktor Pengali</h3>
                          <button onClick={addFactor} className="text-xs font-bold text-indigo-600 hover:underline flex items-center gap-1">{PlusCircle && <PlusCircle className="w-3 h-3" />} Tambah Faktor</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                          {factors.map(fac => (
                            <div key={fac.id} className="p-4 rounded-xl border border-slate-200 bg-slate-50 flex flex-col gap-3">
                              <div className="flex items-center justify-between">
                                <input type="text" value={fac.label} onChange={(e) => updateFactor(fac.id, e.target.value)} className="bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-bold focus:ring-2 focus:ring-indigo-400 w-full mr-2 text-slate-700" placeholder="Nama Faktor" />
                                <button onClick={() => removeFactor(fac.id)} className="text-slate-400 hover:text-rose-500 p-1 bg-white rounded-lg border border-slate-200">{X && <X className="w-4 h-4" />}</button>
                              </div>
                              <div className="flex items-center justify-between gap-2">
                                <div className="flex items-center bg-white border border-slate-200 rounded-lg overflow-hidden w-24 flex-shrink-0">
                                  <input type="number" step="0.1" value={fac.defaultVal !== undefined ? fac.defaultVal : ''} onChange={(e) => updateFactorDefault(fac.id, e.target.value)} className="w-full px-2 py-1.5 text-sm font-bold text-indigo-600 outline-none text-center" />
                                  <span className="px-2 py-1.5 text-[10px] font-black text-slate-500 bg-slate-100 border-l border-slate-200">%</span>
                                </div>
                                <button onClick={() => applyFactorToAllFloors(fac.id)} className="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-black uppercase tracking-wider py-2 rounded-lg transition-colors shadow-sm" title="Terapkan persentase ini ke semua lantai">
                                  Terapkan Semua
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                        <div className="mt-4 text-[10px] font-bold text-slate-500 bg-indigo-50 p-3 rounded-xl border border-indigo-100 flex items-start gap-2">
                            {Info && <Info className="w-4 h-4 text-indigo-500 flex-shrink-0" />}
                            <p>Ubah persentase di atas untuk mengatur <strong>nilai default</strong> bagi lantai yang baru ditambahkan. Klik tombol <strong>"Terapkan Semua"</strong> untuk memaksa seluruh lantai yang sudah ada agar mengikuti persentase tersebut.</p>
                        </div>
                      </div>
                    )}

                    {showZoneManager && (
                      <div className="bg-white p-6 rounded-2xl border-2 border-indigo-100 shadow-md">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-slate-800 flex items-center gap-2">{Settings2 && <Settings2 className="w-5 h-5 text-indigo-600" />} Manajemen Zoning</h3>
                          <button onClick={addZone} className="text-xs font-bold text-indigo-600 hover:underline">+ Tambah Zona</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                          {zones.map(z => (
                            <div key={z.id} className={`p-3 rounded-xl border flex flex-col gap-2 ${getZoneStyle(z.colorId).color.split(' ')[0]}`}>
                              <div className="flex items-center justify-between">
                                <input type="text" value={z.label} onChange={(e) => updateZone(z.id, 'label', e.target.value)} className="bg-white/50 border-none rounded px-2 py-0.5 text-xs font-bold w-full mr-2" />
                                <button onClick={() => removeZone(z.id)}>{X && <X className="w-3 h-3" />}</button>
                              </div>
                              <div className="flex gap-1">
                                {ZONE_COLORS.map(c => (
                                  <button key={c.id} onClick={() => updateZone(z.id, 'colorId', c.id)} className={`w-5 h-5 rounded-full border-2 ${c.color.split(' ')[0]} ${z.colorId === c.id ? 'border-indigo-600' : 'border-transparent'}`} />
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    <div className="space-y-4">
                      
                      {/* TABS GEDUNG */}
                      <div className="flex items-center gap-2 overflow-x-auto pb-2 border-b-2 border-slate-200">
                         {buildings.map((b, idx) => (
                            <div 
                                key={b.id} 
                                className={`flex items-center group relative transition-all duration-200 ${draggedBuildingIdx === idx ? 'opacity-40 scale-95' : ''} ${dragOverBuildingIdx === idx && draggedBuildingIdx !== idx ? 'border-l-4 border-l-indigo-500 pl-1' : ''}`}
                                draggable 
                                onDragStart={(e) => handleBuildingDragStart(e, idx)} 
                                onDragOver={(e) => handleBuildingDragOver(e, idx)} 
                                onDrop={(e) => handleBuildingDrop(e, idx)} 
                                onDragEnd={handleBuildingDragEnd}
                            >
                                <button 
                                    onClick={() => setActiveBuildingId(b.id)}
                                    className={`flex items-center gap-2 whitespace-nowrap pl-4 pr-8 py-3 font-black text-sm rounded-t-xl transition-all border-x border-t cursor-pointer ${activeBuildingId === b.id ? 'bg-indigo-600 text-white border-indigo-600 shadow-md' : 'bg-slate-100 text-slate-500 border-slate-200 hover:bg-slate-200'}`}
                                >
                                    <span className={`cursor-grab active:cursor-grabbing ${activeBuildingId === b.id ? 'text-indigo-300 hover:text-white' : 'text-slate-400 hover:text-slate-600'}`} title="Tahan dan geser untuk memindahkan gedung">
                                      {GripVertical && <GripVertical className="w-4 h-4" />}
                                    </span>
                                    {b.name}
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); removeBuilding(b.id); }} 
                                    className={`absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded-full transition-colors ${activeBuildingId === b.id ? 'text-white/70 hover:text-white hover:bg-rose-500 opacity-100' : 'opacity-0 hidden'}`}
                                >
                                    {X && <X className="w-3 h-3" />}
                                </button>
                            </div>
                         ))}
                         <button onClick={addBuilding} className="flex items-center gap-2 px-4 py-3 ml-2 text-sm font-bold text-indigo-600 hover:bg-indigo-50 rounded-xl transition-colors border border-dashed border-indigo-300">
                            {Plus && <Plus className="w-4 h-4" />} Gedung Baru
                         </button>
                      </div>

                      {/* EDITOR GEDUNG AKTIF */}
                      {activeBuilding && (
                          <div className="bg-indigo-50/30 p-6 rounded-b-2xl border border-t-0 border-indigo-100 mb-8 animate-in fade-in">
                              
                              <div className="flex justify-between items-center mb-4 px-1">
                                 <div className="text-xs font-black text-indigo-900 uppercase tracking-widest flex items-center gap-2">
                                     {Building && <Building className="w-4 h-4" />} Pengaturan Gedung
                                 </div>
                                 <button 
                                     onClick={() => setDuplicateBuildingModal({ isOpen: true, buildingId: activeBuilding.id, count: 1 })} 
                                     className="text-xs font-bold flex items-center gap-1.5 text-indigo-700 bg-white border border-indigo-200 hover:bg-indigo-100 hover:border-indigo-300 px-3 py-1.5 rounded-lg shadow-sm transition-colors"
                                 >
                                     {Copy && <Copy className="w-3 h-3" />} Duplikasi Gedung
                                 </button>
                              </div>

                              <div className="flex flex-col md:flex-row gap-6 items-start mb-8 bg-white p-5 rounded-xl border border-indigo-100 shadow-sm">
                                  <div className="flex-1 w-full">
                                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Nama Gedung</label>
                                      <input 
                                        type="text" 
                                        value={activeBuilding.name} 
                                        onChange={(e) => updateBuilding(activeBuilding.id, 'name', e.target.value)} 
                                        className="w-full bg-slate-50 border border-slate-200 rounded-lg px-4 py-3 font-black text-slate-800 text-lg focus:ring-2 focus:ring-indigo-400 outline-none" 
                                      />
                                  </div>
                                  <div className="flex-1 w-full">
                                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Lantai Acuan Footprint (KDB)</label>
                                      <select 
                                        value={activeBuilding.kdbFloorId} 
                                        onChange={(e) => updateBuilding(activeBuilding.id, 'kdbFloorId', e.target.value)} 
                                        className="w-full bg-emerald-50 border border-emerald-200 text-emerald-800 rounded-lg px-4 py-3 font-bold focus:ring-2 focus:ring-emerald-400 outline-none"
                                      >
                                        <option value="">-- Tidak Dihitung --</option>
                                        {activeBuildingFloors.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                      </select>
                                      <p className="text-[9px] text-slate-500 mt-1 pl-1">Menyumbang {stats.buildingDetails.find(b=>b.id === activeBuilding.id)?.footprint.toFixed(1)} m² ke KDB Kawasan.</p>
                                  </div>
                                  <div className="flex-1 w-full">
                                      <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Lantai Acuan Basement (KTB)</label>
                                      <select

                                            <input type="text" value={f.name} onChange={(e) => updateFloorConfig(f.id, 'name', e.target.value)} className="bg-transparent border-none font-black text-slate-700 focus:ring-0 p-0 text-lg w-40" />

                                            <button onClick={() => removeFloor(f.id)} className="text-slate-300 hover:text-rose-500 p-2" title="Hapus Lantai">{Trash2 && <Trash2 className="w-4 h-4" />}</button>
