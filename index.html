                                                                name="roomLabel"
                                                                autoComplete="off"
                                                                list="room-name-options" 
                                                                value={room.label} 
                                                                onChange={(e) => updateRoom(room.id, 'label', e.target.value)} 
                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onBlur={() => updateSuggestions()}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'name')} 
                                                                className="w-full bg-transparent border border-transparent font-medium text-zinc-800 text-sm focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-300 rounded px-2 py-1 outline-none transition-all" 
                                                                placeholder="Ketik nama ruang..."
                                                            />
                                                        </td>
                                                        <td className="py-2 px-2 border-r border-zinc-100">
                                                            <input 
                                                                data-grid-id={`${room.id}-count`}
                                                                type="number" 
                                                                value={room.count} 
                                                                onChange={(e) => updateRoom(room.id, 'count', e.target.value)} 
                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'count')} 
                                                                className="w-full bg-transparent hover:bg-zinc-50 border border-transparent hover:border-zinc-200 focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-300 rounded-md text-center font-mono font-bold text-sm py-1 px-1 outline-none transition-all" 
                                                            />
                                                        </td>
                                                        <td className="py-2 px-2 border-r border-zinc-100">
                                                            <input 
                                                                data-grid-id={`${room.id}-std`}
                                                                type="number" step="0.1" 
                                                                value={room.std} 
                                                                onChange={(e) => updateRoom(room.id, 'std', e.target.value)} 
                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'std')} 
                                                                className="w-full bg-transparent hover:bg-zinc-50 border border-transparent hover:border-zinc-200 focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-300 rounded-md text-center font-mono font-bold text-sm py-1 px-1 outline-none transition-all" 
                                                            />
                                                        </td>
                                                        <td className="py-2 px-3 text-center font-mono font-black text-sm text-zinc-900 bg-zinc-50/50 border-r border-zinc-200">
                                                            {((Number(room.count) || 0) * (Number(room.std) || 0)).toFixed(1)}
                                                        </td>
                                                        <td className="py-2 px-2 border-r border-zinc-100">
                                                            <input 
                                                                data-grid-id={`${room.id}-occupants`}
                                                                type="number" 
                                                                value={room.occupants || ''} 
                                                                onChange={(e) => updateRoom(room.id, 'occupants', e.target.value)} 
                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'occupants')} 
                                                                placeholder="-" 
                                                                className="w-full bg-transparent hover:bg-zinc-50 border border-transparent hover:border-zinc-200 focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-300 rounded-md text-center font-mono font-bold text-sm py-1 px-1 outline-none transition-all" 
                                                            />
                                                        </td>
                                                        <td className="py-2 px-2">
                                                            <input 
                                                                data-grid-id={`${room.id}-notes`}
                                                                type="text" 
                                                                name="roomNotes"
                                                                autoComplete="off"
                                                                list="reference-options" 
                                                                value={room.notes || ''} 
                                                                onChange={(e) => updateRoom(room.id, 'notes', e.target.value)} 
                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onBlur={() => updateSuggestions()}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'notes')} 
                                                                placeholder="Catatan opsional..." 
                                                                className="w-full bg-transparent border border-transparent font-medium text-zinc-500 text-xs focus:bg-white focus:border-blue-300 focus:ring-1 focus:ring-blue-300 rounded px-2 py-1 outline-none transition-all" 
                                                            />
                                                        </td>
                                                        <td className="py-2 px-2 text-center border-l border-zinc-50">
                                                            <button onClick={() => removeRoom(room.id)} className="text-zinc-300 hover:text-rose-500 hover:bg-rose-50 p-1.5 rounded transition-all opacity-0 group-hover/row:opacity-100 focus:opacity-100 outline-none">{X && <X className="w-3.5 h-3.5" />}</button>
                                                        </td>
                                                      </tr>
                                                    );
                                                  })}
                                                  
                                                  {/* Tombol Tambah Baris */}
                                                  <tr>
                                                    <td colSpan={9} className="py-2 px-4 bg-zinc-50/50 hover:bg-zinc-100 transition-colors cursor-pointer" onClick={() => addRoom(f.id)}>
                                                      <div className="w-full flex items-center justify-center gap-2 py-1.5 text-xs font-bold text-blue-600 opacity-70 hover:opacity-100">
                                                        {PlusCircle && <PlusCircle className="w-3.5 h-3.5" />} Baris Baru (Atau tekan Enter di nama/catatan)
                                                      </div>
                                                    </td>
                                                  </tr>
                                                </tbody>
                                                
                                                {/* STICKY FOOTER */}
                                                <tfoot className="sticky bottom-0 z-20 bg-zinc-100 shadow-[0_-1px_2px_rgba(0,0,0,0.05)] border-t border-zinc-300">
                                                  <tr className="text-xs">
                                                    <td colSpan={5} className="py-3 px-4 text-right text-zinc-500 font-bold uppercase tracking-widest border-r border-zinc-200">
                                                        Estimasi Bruto Lantai <span className="text-[10px] ml-1 bg-white px-1 border border-zinc-300 rounded text-zinc-400">+{stats.floorDetails.find(fd => fd.id === f.id)?.totalMultiplier ?? 0}%</span>
                                                    </td>
                                                    <td className="py-3 px-3 text-center font-mono font-black text-blue-700 border-r border-zinc-200">
                                                        {stats.floorDetails.find(fd => fd.id === f.id)?.bruto.toFixed(1)} m²
                                                    </td>
                                                    <td colSpan={3}></td>
                                                  </tr>
                                                </tfoot>
                                              </table>
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                  ))}
                              </div>
                              
                              <button onClick={() => addFloor('bottom')} className={`w-full flex items-center justify-center gap-2 py-3 mt-6 text-sm font-bold border border-dashed rounded-lg transition-all bg-zinc-50 border-zinc-300 text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900 shadow-sm`}>
                                {Plus && <Plus className="w-4 h-4" />} Tambah Lantai di Gedung {activeBuilding.name} (Alt + L)
                              </button>
                          </div>
                      )}
                    </div>
                  </div>
                )}

                {/* TAB REPORT VIEW (Unchanged data, stylized to match theme) */}
                {activeTab === 'report' && (
                  <div className="flex flex-col gap-8 animate-in fade-in slide-in-from-bottom-2">
                    {/* The report code is kept functionally identical, but inherits the new global CSS (zinc, sharp borders, font-mono) */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      
                      {/* Analisis GFA Kawasan */}
                      <div className="bg-white p-6 rounded-xl border border-zinc-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-zinc-300">
                        <h3 className="font-bold text-zinc-800 mb-6 flex items-center gap-2">{PieChart && <PieChart className="w-5 h-5 text-blue-600 print:text-black" />} Distribusi GFA</h3>
                        <div className="space-y-6 max-h-80 overflow-y-auto custom-scroll pr-2">
                          {stats.buildingDetails.map(b => {
                            const percentage = stats.brutoTotal > 0 ? (b.bruto / stats.brutoTotal) * 100 : 0;
                            return (
                              <div key={b.id}>
                                <div className="flex justify-between items-end border-b border-zinc-100 pb-1 mb-3 print:border-zinc-300">
                                  <span className="text-[10px] font-black uppercase text-zinc-700 print:text-black">
                                    {b.name} <span className="text-zinc-400 font-bold ml-1">({percentage.toFixed(1)}%)</span>
                                  </span>
                                  <span className="text-[10px] font-bold text-blue-600 font-mono">{b.bruto.toFixed(1)} m²</span>
                                </div>
                                
                                <div className="space-y-3">
                                  {b.floors.map(f => {
                                    const floorPercentage = b.bruto > 0 ? (f.bruto / b.bruto) * 100 : 0;
                                    return (
                                      <div key={f.id}>
                                        <div className="flex justify-between text-[9px] mb-1 font-bold uppercase text-zinc-500 print:text-zinc-700">
                                          <span>{f.name} <span className="opacity-60 ml-1">({floorPercentage.toFixed(1)}%)</span></span>
                                          <span className="font-mono">{f.bruto.toFixed(1)} m²</span>
                                        </div>
                                        <div className="w-full bg-zinc-100 h-1.5 rounded-full overflow-hidden print:border print:border-zinc-200">
                                          <div className="bg-blue-500 h-full print:bg-zinc-500" style={{ width: `${floorPercentage}%` }}></div>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Komposisi Zona */}
                      <div className="bg-white p-6 rounded-xl border border-zinc-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-zinc-300">
                        <h3 className="font-bold text-zinc-800 mb-6 flex items-center gap-2">{MapIcon && <MapIcon className="w-5 h-5 text-blue-600 print:text-black" />} Komposisi Zona (Bruto)</h3>
                        <div className="space-y-6 max-h-80 overflow-y-auto custom-scroll pr-2">
                          {stats.buildingDetails.map(b => (
                            <div key={b.id}>
                              <div className="flex justify-between items-end border-b border-zinc-100 pb-1 mb-3 print:border-zinc-300">
                                <span className="text-[10px] font-black uppercase text-zinc-700 print:text-black">{b.name}</span>
                                <span className="text-[10px] font-bold font-mono text-emerald-600">{b.bruto.toFixed(1)} m²</span>
                              </div>
                              
                              <div className="space-y-3">
                                {b.zoneBreakdown.map(z => {
                                  if (z.brutoArea === 0) return null; 
                                  const percentage = b.bruto > 0 ? (z.brutoArea / b.bruto) * 100 : 0;
                                  return (
                                    <div key={z.id}>
                                      <div className="flex justify-between text-[9px] mb-1 font-bold uppercase text-zinc-600 print:text-black">
                                        <span>{z.name} <span className="opacity-60 ml-1">({percentage.toFixed(1)}%)</span></span>
                                        <span className="font-mono">{z.brutoArea.toFixed(1)} m²</span>
                                      </div>
                                      <div className="w-full bg-zinc-100 h-1.5 rounded-full overflow-hidden print:border print:border-zinc-200">
                                        <div className={`${z.style.color.split(' ')[0].replace('100', '500')} h-full print:bg-zinc-600`} style={{ width: `${percentage}%` }}></div>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Elevasi per Gedung */}
                      <div className="bg-white p-6 rounded-xl border border-zinc-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-zinc-300 flex flex-col">
                        <h3 className="font-bold text-zinc-800 mb-6 flex items-center gap-2 shrink-0">{Layers && <Layers className="w-5 h-5 text-blue-600 print:text-black" />} Profil Elevasi Gedung</h3>
                        <div className="flex flex-col gap-4 overflow-y-auto max-h-64 custom-scroll pr-2">
                            {stats.buildingDetails.map(b => (
                                <div key={b.id} className="border-b border-zinc-100 pb-3 last:border-0 print:border-zinc-300">
                                    <div className="text-[10px] font-black uppercase text-zinc-800 mb-2 print:text-black">{b.name}</div>
                                    <div className="flex justify-between items-center text-xs">
                                        <span className="text-blue-600 font-bold font-mono">↑ Atas: +{b.heightAbove.toFixed(2)}m</span>
                                        <span className="text-amber-600 font-bold font-mono">↓ Bawah: -{b.depthBelow.toFixed(2)}m</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="mt-4 pt-3 border-t border-zinc-100 print:border-zinc-300 text-[9px] text-zinc-500 font-medium leading-relaxed italic">
                            *Data ketinggian ini belum ditambahkan dengan tinggi crown atau parapet bangunan dan jangan lupa cek batasan KKOP.
                        </div>
                      </div>
                    </div>

                    {/* TABEL REPORT PER GEDUNG */}
                    <div className="bg-white rounded-xl shadow-md border border-zinc-200 overflow-hidden print:shadow-none print:border-none">
                      <div className="p-6 md:p-8 border-b border-zinc-200 bg-zinc-50 flex justify-between items-center print:border-b-2 print:border-black print:bg-white print:p-0 print:mb-4">
                        <div><h2 className="text-xl font-black text-zinc-900 uppercase tracking-tight">Rincian Luasan Bangunan</h2></div>
                        <div className="flex items-center gap-3 print:hidden" data-html2canvas-ignore="true">
                          <div className="flex items-center bg-white rounded-md px-3 py-1.5 border border-zinc-300 shadow-sm">
                            <span className="text-[10px] font-bold text-zinc-500 uppercase tracking-widest mr-2 hidden sm:inline">Urutkan:</span>
                            <select value={reportSortBy} onChange={(e) => setReportSortBy(e.target.value)} className="bg-transparent text-xs font-bold text-zinc-800 border-none outline-none focus:ring-0 p-0 cursor-pointer">
                              <option value="default">Hierarki Default</option>
                              <option value="name">Abjad Ruangan</option>
                              <option value="zone">Kelompok Zona</option>
                            </select>
                          </div>
                        </div>
                      </div>

                      <div className="p-6 md:p-8 print:p-0 space-y-12">
                        {stats.buildingDetails.map(b => (
                            <div key={b.id} className="break-inside-avoid">
                                <div className={`bg-zinc-800 text-white p-3 md:px-5 rounded-t-lg flex justify-between items-center print:bg-zinc-200 print:text-black print:border print:border-black`}>
                                    <h3 className="font-black uppercase tracking-wider text-sm">{b.name} <span className="text-xs ml-2 opacity-80 normal-case font-medium">({b.occupants} Penghuni)</span></h3>
                                </div>
                                {b.notes && (
                                    <div className="bg-zinc-50 border-x border-zinc-200 px-5 py-3 text-xs text-zinc-600 print:border-x-black print:bg-white print:text-black flex gap-2 items-start">
                                        <Info className="w-4 h-4 shrink-0 mt-0.5 opacity-60" />
                                        <p><strong className="text-zinc-800">Spesifikasi:</strong> {b.notes}</p>
                                    </div>
                                )}
                                <div className="overflow-x-auto custom-scroll">
                                <table className="w-full border-collapse text-xs border border-t-0 border-zinc-300 print:border-black whitespace-nowrap md:whitespace-normal">
                                <thead>
                                    <tr className="bg-zinc-100 text-zinc-600 font-bold uppercase tracking-widest text-[10px] print:bg-zinc-100 print:text-black">
                                    <th className="py-3 px-4 text-left border border-zinc-300 print:border-black w-24">Lantai</th>
                                    <th className="py-3 px-4 text-left border border-zinc-300 print:border-black">Nama Ruangan</th>
                                    <th className="py-3 px-4 text-center border border-zinc-300 print:border-black">Zona</th>
                                    <th className="py-3 px-4 text-center border border-zinc-300 print:border-black">Jml</th>
                                    <th className="py-3 px-4 text-center border border-zinc-300 print:border-black">Luas (m²)</th>
                                    <th className="py-3 px-4 text-center border border-zinc-300 print:border-black">Penghuni</th>
                                    <th className="py-3 px-4 text-left border border-zinc-300 print:border-black">Keterangan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {b.floors.map((f) => (
                                    <React.Fragment key={f.id}>
                                        {(() => {
                                        let displayRooms = rooms.filter(r => r.floorId === f.id);
                                        if (reportSortBy === 'name') displayRooms = [...displayRooms].sort((a, b) => a.label.localeCompare(b.label));
                                        else if (reportSortBy === 'zone') displayRooms = [...displayRooms].sort((a, b) => { const zA = zones.find(z=>z.id===a.zoneId)?.label||''; const zB = zones.find(z=>z.id===b.zoneId)?.label||''; return zA.localeCompare(zB); });
                                        
                                        if (displayRooms.length === 0) {
                                            return (
                                                <tr className="border-b border-zinc-200 print:border-zinc-300">
                                                    <td className="py-2.5 px-4 font-black text-zinc-700 bg-zinc-50 border-x border-zinc-300 print:border-zinc-300 align-top w-24">{f.name}</td>
                                                    <td colSpan={6} className="py-2.5 px-4 text-center text-zinc-400 italic border-x border-zinc-300 print:border-zinc-300">Belum ada ruangan terdefinisi</td>
                                                </tr>
                                            );
                                        }

                                        return displayRooms.map((room, idx) => {
                                            const z = zones.find(z => z.id === room.zoneId) || zones[0];
                                            return (
                                            <tr key={room.id} className="border-b border-zinc-200 hover:bg-zinc-50 print:border-zinc-300">
                                                {idx === 0 && (
                                                    <td rowSpan={displayRooms.length} className="py-2 px-4 font-black text-zinc-800 bg-zinc-50 border-x border-zinc-300 print:border-zinc-300 align-top w-24">
                                                        {f.name}
                                                    </td>
                                                )}
                                                <td className="py-2.5 px-4 font-bold text-zinc-700 border-x border-zinc-300 print:border-zinc-300">{room.label}</td>
                                                <td className="py-2.5 px-4 text-center border-x border-zinc-300 print:border-zinc-300"><span className={`px-2 py-0.5 rounded text-[9px] font-bold uppercase print:border print:border-zinc-400 print:bg-transparent print:text-black ${getZoneStyle(z.colorId).color}`}>{z.label}</span></td>
                                                <td className="py-2.5 px-4 text-center font-mono border-x border-zinc-300 print:border-zinc-300">{room.count}</td>
                                                <td className="py-2.5 px-4 text-center font-mono font-black border-x border-zinc-300 print:border-zinc-300">{((Number(room.count) || 0) * (Number(room.std) || 0)).toFixed(1)}</td>
                                                <td className="py-2.5 px-4 text-center font-mono text-zinc-600 border-x border-zinc-300 print:border-zinc-300">{room.occupants || '-'}</td>
                                                <td className="py-2.5 px-4 text-left text-[10px] text-zinc-500 italic max-w-[150px] truncate border-x border-zinc-300 print:border-zinc-300" title={room.notes}>{room.notes || '-'}</td>
                                            </tr>
                                            );
                                        });
                                        })()}
                                        {factors.map(fac => {
                                        const rawValue = f.factorValues?.[fac.id] !== undefined ? f.factorValues[fac.id] : '';
                                        const facValue = Number(rawValue) || 0; const facArea = (f.netto * facValue) / 100;
                                        const z = zones.find(z => z.id === fac.zoneId);
                                        if (facValue === 0) return null;
                                        return (
                                            <tr key={`${f.id}-${fac.id}`} className="text-[10px] bg-white text-zinc-500 border border-zinc-200 print:border-zinc-300 print:text-black">
                                            <td className="border-r border-zinc-300 print:border-zinc-300"></td>
                                            <td className="border-r border-zinc-300 print:border-zinc-300"></td>
                                            <td className="py-1.5 px-4 text-center italic border-r border-zinc-300 print:border-zinc-300">+ {fac.label} {z ? `(→ ${z.label})` : ''}</td>
                                            <td className="py-1.5 px-4 text-center font-mono italic border-r border-zinc-300 print:border-zinc-300">{facValue}%</td>
                                            <td className="py-1.5 px-4 text-center font-mono font-bold border-r border-zinc-300 print:border-zinc-300">{facArea.toFixed(1)} m²</td>
                                            <td className="border-r border-zinc-300 print:border-zinc-300"></td>
                                            <td></td>
                                            </tr>
                                        );
                                        })}
                                        <tr className="text-[10px] bg-zinc-50 text-zinc-600 font-bold border border-zinc-300 print:border-black print:bg-white print:text-black">
                                        <td colSpan={4} className="py-2.5 px-4 text-right uppercase border-r border-zinc-300 print:border-black">Subtotal Netto {f.name} <span className="normal-case italic opacity-75">(Tanpa Add. Factors)</span></td>
                                        <td className="py-2.5 px-4 text-center font-mono font-black border-r border-zinc-300 print:border-black">{f.netto.toFixed(1)} m²</td>
                                        <td className="py-2.5 px-4 text-center font-mono font-black border-r border-zinc-300 print:border-black">{f.occupants} <span className="text-[9px] font-sans font-medium normal-case">org</span></td>
                                        <td></td>
                                        </tr>
                                        <tr className="text-[11px] bg-blue-50 border-t border-b-2 border-blue-200 text-blue-900 font-black print:bg-zinc-100 print:border-black print:text-black">
                                        <td colSpan={4} className="py-3 px-4 text-right uppercase border-r border-blue-200 print:border-black">Total Luas Bruto {f.name}</td>
                                        <td className="py-3 px-4 text-center font-mono text-sm border-r border-blue-200 print:border-black">{f.bruto.toFixed(1)} m²</td>
                                        <td colSpan={2}></td>
                                        </tr>
                                    </React.Fragment>
                                    ))}
                                    <tr className="text-xs bg-zinc-900 text-white font-black border border-zinc-900 print:bg-zinc-200 print:border-black print:text-black">
                                        <td colSpan={4} className="py-4 px-4 text-right uppercase tracking-widest border-r border-zinc-700 print:border-black">TOTAL GFA & PENGHUNI {b.name}</td>
                                        <td className="py-4 px-4 text-center font-mono text-base border-r border-zinc-700 print:border-black">{b.bruto.toFixed(1)} m²</td>
                                        <td className="py-4 px-4 text-center font-mono text-sm border-r border-zinc-700 print:border-black">{b.occupants} <span className="text-[10px] font-sans font-medium normal-case">org</span></td>
                                        <td className="py-4 px-4 text-left font-mono text-[10px] opacity-80 uppercase tracking-widest">FP: {b.footprint.toFixed(1)} m²</td>
                                    </tr>
                                </tbody>
                                </table>
                                </div>
                            </div>
                        ))}

                        {/* REKAPITULASI AKHIR MASTERPLAN */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8 print:break-inside-avoid border-t-4 border-zinc-900 pt-8">
                          <div className="p-5 bg-zinc-50 rounded-xl border border-zinc-200 print:bg-white print:border-black">
                            <p className="text-xs font-black text-zinc-500 uppercase tracking-widest mb-4 print:text-black">Resume Intensitas Lahan</p>
                            <div className="space-y-3 text-sm">
                              <div className="flex justify-between border-b border-zinc-200/60 pb-2 print:border-zinc-300"><span className="text-zinc-600">Luas Lahan</span> <span className="font-bold font-mono text-zinc-900">{landArea} m²</span></div>
                              <div className="flex justify-between border-b border-zinc-200/60 pb-2 print:border-zinc-300"><span className="text-zinc-600">KDB Gabungan (Maks. {kdbLimit}%)</span> <span className={`font-black font-mono ${stats.currentKDB > (Number(kdbLimit)||0) ? 'text-rose-600 print:text-black' : 'text-zinc-900'}`}>{stats.currentKDB.toFixed(1)}%</span></div>
                              <div className="flex justify-between border-b border-zinc-200/60 pb-2 print:border-zinc-300"><span className="text-zinc-600">KTB Gabungan (Maks. {ktbLimit}%)</span> <span className={`font-black font-mono ${stats.currentKTB > (Number(ktbLimit)||0) ? 'text-rose-600 print:text-black' : 'text-zinc-900'}`}>{stats.currentKTB.toFixed(1)}%</span></div>
                              <div className="flex justify-between border-b border-zinc-200/60 pb-2 print:border-zinc-300"><span className="text-zinc-600">KDH (Min. {kdhLimit}%)</span> <span className="font-bold font-mono text-emerald-600 print:text-black">≥ {stats.minRequiredKDHArea.toFixed(1)} m²</span></div>
                              <div className="flex justify-between border-b border-zinc-200/60 pb-2 print:border-zinc-300"><span className="text-zinc-600">KLB Kawasan (Maks. {klbLimit})</span> <span className={`font-black font-mono ${stats.currentKLB > (Number(klbLimit)||0) ? 'text-rose-600 print:text-black' : 'text-zinc-900'}`}>{stats.currentKLB.toFixed(2)}</span></div>
                            </div>
                          </div>
                          <div className="p-5 bg-zinc-900 rounded-xl text-white print:bg-white print:text-black print:border print:border-black flex flex-col justify-between">
                            <div>
                                <p className="text-xs font-black text-zinc-400 uppercase tracking-widest mb-4 print:text-black">Grand Total Keseluruhan</p>
                                <div className="space-y-3 text-sm">
                                  <div className="flex justify-between border-b border-zinc-700/60 pb-2 print:border-zinc-300"><span className="text-zinc-300">Total Luas Netto</span> <span className="font-black font-mono text-white print:text-black">{stats.nettoTotal.toFixed(1)} m²</span></div>
                                  <div className="flex justify-between border-b border-zinc-700/60 pb-2 print:border-zinc-300"><span className="text-zinc-300">Total Additional Factors</span> <span className="font-black font-mono text-white print:text-black">{Object.values(stats.factorAreas).reduce((a, b) => a + b, 0).toFixed(1)} m²</span></div>
                                  <div className="flex justify-between border-b border-zinc-700/60 pb-2 print:border-zinc-300"><span className="text-zinc-300">Total Kapasitas Penghuni</span> <span className="font-black font-mono text-white print:text-black">{stats.occupantsTotal} Orang</span></div>
                                </div>
                            </div>
                            <div className="flex items-center justify-between text-xl font-black pt-4 mt-4 print:border-t print:border-black">
                                <span className="text-blue-400 print:text-black">GFA KAWASAN</span> <span className="text-2xl font-mono">{stats.brutoTotal.toFixed(1)} m²</span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {/* MODALS Pindah / Duplikat */}
              {moveModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b pb-3"><h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">{MoveRight && <MoveRight className="w-4 h-4 text-blue-600" />} Pindahkan Ruang</h3><button onClick={() => setMoveModal({ isOpen: false, targetFloorId: '' })}>{X && <X className="w-4 h-4 text-zinc-400" />}</button></div>
                    <div className="mb-6"><label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Lantai Tujuan</label><select value={moveModal.targetFloorId} onChange={(e) => setMoveModal(prev => ({ ...prev, targetFloorId: e.target.value }))} className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-4 py-3 text-sm font-bold text-zinc-800 outline-none"><option value="" disabled>-- Pilih --</option>{buildings.map(b => (<optgroup key={b.id} label={`🏢 ${b.name}`}>{floors.filter(f => f.buildingId === b.id).map(f => (<option key={f.id} value={f.id}>{f.name}</option>))}</optgroup>))}</select></div>
                    <div className="flex gap-2"><button onClick={() => setMoveModal({ isOpen: false, targetFloorId: '' })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 uppercase">Batal</button><button onClick={confirmMoveRooms} disabled={!moveModal.targetFloorId} className="flex-1.5 py-2.5 rounded-md text-xs font-bold bg-zinc-800 text-white uppercase shadow-sm disabled:opacity-50 hover:bg-zinc-900">Pindahkan</button></div>
                  </div>
                </div>
              )}
              {copyRoomModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b pb-3"><h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">{Copy && <Copy className="w-4 h-4 text-blue-600" />} Salin Ruangan</h3><button onClick={() => setCopyRoomModal({ isOpen: false, targetFloorId: '' })}>{X && <X className="w-4 h-4 text-zinc-400" />}</button></div>
                    <div className="mb-6"><label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Salin ke Lantai Tujuan</label><select value={copyRoomModal.targetFloorId} onChange={(e) => setCopyRoomModal(prev => ({ ...prev, targetFloorId: e.target.value }))} className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-4 py-3 text-sm font-bold text-zinc-800 outline-none"><option value="" disabled>-- Pilih Lantai Tujuan --</option>{buildings.map(b => (<optgroup key={b.id} label={`🏢 ${b.name}`}>{floors.filter(f => f.buildingId === b.id).map(f => (<option key={f.id} value={f.id}>{f.name}</option>))}</optgroup>))}</select></div>
                    <div className="flex gap-2"><button onClick={() => setCopyRoomModal({ isOpen: false, targetFloorId: '' })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 uppercase">Batal</button><button onClick={confirmCopyRooms} disabled={!copyRoomModal.targetFloorId} className="flex-1.5 py-2.5 rounded-md text-xs font-bold bg-zinc-800 text-white uppercase shadow-sm disabled:opacity-50 hover:bg-zinc-900">Salin Sekarang</button></div>
                  </div>
                </div>
              )}
              {moveFloorModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b pb-3">
                        <h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">{MoveRight && <MoveRight className="w-4 h-4 text-blue-600" />} Pindah Lantai</h3>
                        <button onClick={() => setMoveFloorModal({ isOpen: false, floorId: null, targetBuildingId: '' })}>{X && <X className="w-4 h-4 text-zinc-400" />}</button>
                    </div>
                    <div className="mb-6">
                        <label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Pindah ke Gedung</label>
                        <select 
                            value={moveFloorModal.targetBuildingId} 
                            onChange={(e) => setMoveFloorModal(prev => ({ ...prev, targetBuildingId: e.target.value }))} 
                            className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-4 py-3 text-sm font-bold text-zinc-800 outline-none focus:ring-1 focus:ring-blue-500"
                        >
                            <option value="" disabled>-- Pilih Gedung --</option>
                            {buildings.map(b => (
                                <option key={b.id} value={b.id} disabled={b.id === activeBuildingId}>{b.name} {b.id === activeBuildingId ? '(Sekarang)' : ''}</option>
                            ))}
                        </select>
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setMoveFloorModal({ isOpen: false, floorId: null, targetBuildingId: '' })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 uppercase">Batal</button>
                        <button onClick={confirmMoveFloor} disabled={!moveFloorModal.targetBuildingId || moveFloorModal.targetBuildingId === activeBuildingId} className="flex-1.5 py-2.5 rounded-md text-xs font-bold bg-zinc-800 text-white uppercase shadow-sm disabled:opacity-50 hover:bg-zinc-900">Pindahkan</button>
                    </div>
                  </div>
                </div>
              )}
              {duplicateModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b pb-3">
                        <h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">{Copy && <Copy className="w-4 h-4 text-blue-600" />} Duplikasi Lantai</h3>
                        <button onClick={() => setDuplicateModal({ isOpen: false, floorId: null, targetBuildingId: '', count: 1 })}>{X && <X className="w-4 h-4 text-zinc-400" />}</button>
                    </div>
                    <div className="mb-4">
                        <label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Salin ke Gedung</label>
                        <select 
                            value={duplicateModal.targetBuildingId} 
                            onChange={(e) => setDuplicateModal(prev => ({ ...prev, targetBuildingId: e.target.value }))} 
                            className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-3 py-2 text-sm font-bold text-zinc-800 outline-none focus:ring-1 focus:ring-blue-500"
                        >
                            <option value="" disabled>-- Pilih Gedung --</option>
                            {buildings.map(b => (
                                <option key={b.id} value={b.id}>{b.name}</option>
                            ))}
                        </select>
                    </div>
                    <div className="mb-6">
                        <label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Jumlah Salinan Baru</label>
                        <input type="number" min="1" max="100" value={duplicateModal.count} onChange={(e) => setDuplicateModal(prev => ({ ...prev, count: parseInt(e.target.value) || 1 }))} className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-4 py-3 text-xl text-center font-mono font-black text-zinc-800 outline-none focus:ring-1 focus:ring-blue-500" autoFocus />
                    </div>
                    <div className="flex gap-2">
                        <button onClick={() => setDuplicateModal({ isOpen: false, floorId: null, targetBuildingId: '', count: 1 })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 uppercase">Batal</button>
                        <button onClick={confirmDuplicate} className="flex-1.5 py-2.5 rounded-md text-xs font-bold bg-zinc-800 text-white uppercase shadow-sm hover:bg-zinc-900 disabled:opacity-50" disabled={!duplicateModal.targetBuildingId}>Gandakan</button>
                    </div>
                  </div>
                </div>
              )}
              {duplicateBuildingModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b pb-3"><h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">{Copy && <Copy className="w-4 h-4 text-blue-600" />} Duplikasi Gedung</h3><button onClick={() => setDuplicateBuildingModal({ isOpen: false, buildingId: null, count: 1 })}>{X && <X className="w-4 h-4 text-zinc-400" />}</button></div>
                    <div className="mb-6"><label className="text-[10px] font-black text-zinc-500 uppercase block mb-2">Jumlah Salinan Gedung Baru</label><input type="number" min="1" max="20" value={duplicateBuildingModal.count} onChange={(e) => setDuplicateBuildingModal(prev => ({ ...prev, count: parseInt(e.target.value) || 1 }))} className="w-full bg-zinc-50 border border-zinc-300 rounded-md px-4 py-3 text-xl text-center font-mono font-black text-zinc-800 outline-none focus:ring-1 focus:ring-blue-500" autoFocus /></div>
                    <div className="flex gap-2"><button onClick={() => setDuplicateBuildingModal({ isOpen: false, buildingId: null, count: 1 })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 uppercase">Batal</button><button onClick={confirmDuplicateBuilding} className="flex-1.5 py-2.5 rounded-md text-xs font-bold bg-zinc-800 text-white uppercase shadow-sm hover:bg-zinc-900">Gandakan</button></div>
                  </div>
                </div>
              )}

              {/* MODAL DIALOG UMUM */}
              {dialog.isOpen && (
                <div className="fixed inset-0 z-50 bg-zinc-900/60 backdrop-blur-sm flex items-center justify-center p-4 print:hidden">
                  <div className="bg-white rounded-xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b border-zinc-100 pb-3">
                      <h3 className="text-sm font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">
                        {dialog.type === 'alert' ? (AlertTriangle && <AlertTriangle className="w-4 h-4 text-amber-500" />) : (Info && <Info className="w-4 h-4 text-blue-500" />)}
                        {dialog.title}
                      </h3>
                      <button onClick={() => setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null })} className="text-zinc-400 hover:text-rose-500 bg-zinc-50 hover:bg-rose-50 p-1.5 rounded-md transition-colors">{X && <X className="w-4 h-4" />}</button>
                    </div>
                    <p className="text-sm text-zinc-600 mb-6 font-medium leading-relaxed">{dialog.message}</p>
                    <div className="flex gap-2">
                      {dialog.type === 'confirm' && (
                          <button onClick={() => setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null })} className="flex-1 py-2.5 rounded-md text-xs font-bold bg-zinc-100 text-zinc-600 hover:bg-zinc-200 uppercase tracking-widest">Batal</button>
                      )}
                      <button
                          onClick={() => {
                              if (dialog.onConfirm) dialog.onConfirm();
                              setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });
                          }}
                          className={`flex-1 py-2.5 rounded-md text-xs font-bold text-white uppercase tracking-widest shadow-sm ${dialog.type === 'confirm' ? 'bg-rose-600 hover:bg-rose-700' : 'bg-zinc-800 hover:bg-zinc-900'}`}
                      >
                          {dialog.type === 'confirm' ? 'Lanjutkan' : 'Mengerti'}
                      </button>
                    </div>
                  </div>
                </div>
              )}

              <footer className="max-w-6xl mx-auto px-4 py-8 mt-auto flex flex-col sm:flex-row justify-between items-center text-[10px] font-bold text-zinc-400 tracking-wider print:hidden">
                <span>SCHEMATIC SPACE PLANNER</span>
                <span>© 2026 AFIF HW - POWERED BY GEMINI AI</span>
              </footer>
            </div>
          );
        };

        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
