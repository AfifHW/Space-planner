<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schematic Space Planner</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                        mono: ['JetBrains Mono', 'ui-monospace', 'SFMono-Regular', 'monospace'],
                    }
                } 
            }
        }
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    
    <script>
        window.react = window.React;
        globalThis.react = window.React;
    </script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide-react@0.344.0/dist/umd/lucide-react.min.js" crossorigin></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap');
        
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
            background-color: #f4f4f5; /* Zinc 100 - more neutral */
        }
        #root {
            width: 100%;
            min-height: 100vh;
        }
        #fallback-loading {
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; font-family: sans-serif; font-weight: bold;
            background: #f4f4f5; color: #52525b;
        }
        /* Custom Scrollbar for inner tables */
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Remove number input arrows for clean look */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* Mencegah input berubah putih/kuning setelah memilih Auto Suggestion di Chrome */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            transition: background-color 5000s ease-in-out 0s;
            -webkit-text-fill-color: #27272a !important;
        }
    </style>
</head>
<body class="text-slate-900 font-sans pb-20 print:bg-white print:pb-0">
    
    <div id="root">
        <div id="fallback-loading">Memuat Aplikasi... (Jika macet, periksa koneksi internet)</div>
    </div>

    <script type="text/babel" data-presets="react">
        const { useState, useMemo, useEffect, useCallback, useRef } = window.React;
        
        const lucide = window.lucideReact || window.LucideReact || {};
        const {
            Users, Layout, Settings, Calculator, FileText, Plus, Trash2, Info,
            ChevronRight, ChevronDown, PlusCircle, X, Layers, Building2,
            PieChart, Palette, Settings2, AlertTriangle, CheckCircle2, LandPlot,
            Zap, HardHat, SlidersHorizontal, Undo2, Redo2, GripVertical, Copy,
            MapPin, Printer, FileSpreadsheet, ArrowUpDown, Save, FolderOpen,
            Building, FilePlus, Sparkles, Loader2, MoveRight, Car, ParkingCircle, Bus, Bike, Maximize2, Minimize2
        } = lucide;
        const MapIcon = lucide.Map; 

        // --- GEMINI API CONFIGURATION ---
        const apiKey = ""; 
        const GEMINI_API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

        const callGeminiAPI = async (systemInstruction, promptText) => {
            let payload = { contents: [{ parts: [{ text: promptText }] }], systemInstruction: { parts: [{ text: systemInstruction }] } };
            let retries = 3; let delay = 1000;
            while (retries > 0) {
                try {
                    const response = await fetch(GEMINI_API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    const data = await response.json();
                    const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    if (!textResponse) throw new Error("Empty response from Gemini");
                    return textResponse;
                } catch (error) {
                    retries--; if (retries === 0) throw error;
                    await new Promise(res => setTimeout(res, delay)); delay *= 2; 
                }
            }
        };

        class ErrorBoundary extends React.Component {
          constructor(props) { super(props); this.state = { hasError: false, error: null }; }
          static getDerivedStateFromError(error) { return { hasError: true, error }; }
          render() {
            if (this.state.hasError) {
              return (
                <div className="p-8 text-rose-600 bg-rose-50 min-h-screen font-mono">
                  <h1 className="text-2xl font-bold mb-4">Ups! Terjadi Kesalahan Render.</h1>
                  <pre className="bg-white p-4 rounded border border-rose-200 overflow-auto text-sm">{this.state.error.toString()}</pre>
                </div>
              );
            }
            return this.props.children;
          }
        }

        const ZONE_COLORS = [
          { id: 'blue', color: 'bg-blue-100 text-blue-700', border: 'border-blue-200' },
          { id: 'emerald', color: 'bg-emerald-100 text-emerald-700', border: 'border-emerald-200' },
          { id: 'purple', color: 'bg-purple-100 text-purple-700', border: 'border-purple-200' },
          { id: 'amber', color: 'bg-amber-100 text-amber-700', border: 'border-amber-200' },
          { id: 'rose', color: 'bg-rose-100 text-rose-700', border: 'border-rose-200' },
          { id: 'indigo', color: 'bg-indigo-100 text-indigo-700', border: 'border-indigo-200' },
          { id: 'slate', color: 'bg-slate-100 text-slate-700', border: 'border-slate-200' },
        ];

        const INITIAL_APP_STATE = {
          projectName: 'Nama Proyek',
          projectLocation: 'Lokasi Proyek',
          landArea: 5000,
          kdbLimit: 60,
          ktbLimit: 70,
          kdhLimit: 20, 
          klbLimit: 3.0,
          maxFloorsLimit: 20, 
          factors: [
            { id: 'fac1', label: 'Sirkulasi', defaultVal: 25, zoneId: '' },
            { id: 'fac2', label: 'Servis', defaultVal: 2.5, zoneId: '' },
            { id: 'fac3', label: 'MEP', defaultVal: 2.5, zoneId: '' }
          ],
          zones: [
            { id: 'z1', label: 'Publik', colorId: 'blue' },
            { id: 'z2', label: 'Semi-Publik', colorId: 'emerald' },
            { id: 'z3', label: 'Privat', colorId: 'purple' }
          ],
          parkingRules: [
            { id: 'pr1', name: 'Kebutuhan Mobil', vehicleType: 'Mobil', basis: 'gfa', targetZoneIds: [], ratio: 100, areaPerVehicle: 25 },
            { id: 'pr2', name: 'Kebutuhan Motor', vehicleType: 'Motor', basis: 'gfa', targetZoneIds: [], ratio: 50, areaPerVehicle: 2 }
          ],
          buildings: [
            { id: 'b1', name: 'Gedung Utama', kdbFloorId: 'f1', ktbFloorId: '', notes: '' },
            { id: 'b2', name: 'Gedung Penunjang', kdbFloorId: 'f3', ktbFloorId: '', notes: '' }
          ],
          floors: [
            { id: 'f1', buildingId: 'b1', name: 'Lantai 1', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 25, fac2: 2.5, fac3: 2.5 } },
            { id: 'f2', buildingId: 'b1', name: 'Lantai 2', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 25, fac2: 2.5, fac3: 2.5 } },
            { id: 'f3', buildingId: 'b2', name: 'Lantai Dasar', isBasement: false, floorHeight: 4.0, factorValues: { fac1: 20, fac2: 2.0, fac3: 2.0 } }
          ],
          rooms: [
            { id: 'r1', label: 'Lobby & Resepsionis', floorId: 'f1', zoneId: 'z1', count: 1, std: 60, notes: '', occupants: '' },
            { id: 'r2', label: 'Ruang Kepala', floorId: 'f2', zoneId: 'z3', count: 1, std: 40, notes: '', occupants: '' },
            { id: 'r3', label: 'Ruang Rapat Bersama', floorId: 'f3', zoneId: 'z2', count: 2, std: 50, notes: '', occupants: '10' }
          ]
        };

        const getSavedState = () => {
          try {
            const saved = localStorage.getItem('spacePlannerState');
            if (saved) {
              const parsed = JSON.parse(saved);
              if (parsed && parsed.buildings && parsed.floors) {
                  if(!parsed.parkingRules) parsed.parkingRules = INITIAL_APP_STATE.parkingRules;
                  parsed.parkingRules = parsed.parkingRules.map(pr => {
                      if (pr.targetZoneId !== undefined) { pr.targetZoneIds = pr.targetZoneId ? [pr.targetZoneId] : []; delete pr.targetZoneId; }
                      if (!pr.targetZoneIds) pr.targetZoneIds = [];
                      return pr;
                  });
                  return parsed;
              }
            }
          } catch (e) { console.error("Gagal membaca localStorage", e); }
          return INITIAL_APP_STATE;
        };

        const useUndoableState = (initialState) => {
          const [state, setState] = useState(initialState);
          const [past, setPast] = useState([]);
          const [future, setFuture] = useState([]);
          const set = useCallback((newStateUpdater) => {
            setState(prev => {
              const nextState = typeof newStateUpdater === 'function' ? newStateUpdater(prev) : newStateUpdater;
              if (JSON.stringify(prev) !== JSON.stringify(nextState)) { setPast(p => [...p, prev].slice(-50)); setFuture([]); }
              return nextState;
            });
          }, []);
          const undo = useCallback(() => {
            setPast(p => {
              if (p.length === 0) return p;
              const previous = p[p.length - 1];
              setState(currentState => { setFuture(f => [currentState, ...f]); return previous; });
              return p.slice(0, p.length - 1);
            });
          }, []);
          const redo = useCallback(() => {
            setFuture(f => {
              if (f.length === 0) return f;
              const next = f[0];
              setState(currentState => { setPast(p => [...p, currentState]); return next; });
              return f.slice(1);
            });
          }, []);
          return [state, set, undo, redo, past.length > 0, future.length > 0];
        };

        const App = () => {
          const [appState, setAppState, undo, redo, canUndo, canRedo] = useUndoableState(getSavedState);
          
          const { projectName, projectLocation, landArea, kdbLimit, ktbLimit, kdhLimit, klbLimit, maxFloorsLimit, factors, zones, buildings, floors, rooms } = appState;
          const parkingRules = appState.parkingRules || INITIAL_APP_STATE.parkingRules;

          const setProjectName = (val) => setAppState(prev => ({ ...prev, projectName: typeof val === 'function' ? val(prev.projectName) : val }));
          const setProjectLocation = (val) => setAppState(prev => ({ ...prev, projectLocation: typeof val === 'function' ? val(prev.projectLocation) : val }));
          const setLandArea = (val) => setAppState(prev => ({ ...prev, landArea: typeof val === 'function' ? val(prev.landArea) : val }));
          const setKdbLimit = (val) => setAppState(prev => ({ ...prev, kdbLimit: typeof val === 'function' ? val(prev.kdbLimit) : val }));
          const setKtbLimit = (val) => setAppState(prev => ({ ...prev, ktbLimit: typeof val === 'function' ? val(prev.ktbLimit) : val }));
          const setKdhLimit = (val) => setAppState(prev => ({ ...prev, kdhLimit: typeof val === 'function' ? val(prev.kdhLimit) : val }));
          const setKlbLimit = (val) => setAppState(prev => ({ ...prev, klbLimit: typeof val === 'function' ? val(prev.klbLimit) : val }));
          const setMaxFloorsLimit = (val) => setAppState(prev => ({ ...prev, maxFloorsLimit: typeof val === 'function' ? val(prev.maxFloorsLimit) : val }));
          const setFactors = (val) => setAppState(prev => ({ ...prev, factors: typeof val === 'function' ? val(prev.factors) : val }));
          const setZones = (val) => setAppState(prev => ({ ...prev, zones: typeof val === 'function' ? val(prev.zones) : val }));
          const setParkingRules = (val) => setAppState(prev => ({ ...prev, parkingRules: typeof val === 'function' ? val(prev.parkingRules || []) : val }));

          // UI States
          const [activeTab, setActiveTab] = useState('input');
          const [showProjectParams, setShowProjectParams] = useState(false);
          const [activeBuildingId, setActiveBuildingId] = useState(buildings[0]?.id || null);
          const [showZoneManager, setShowZoneManager] = useState(false);
          const [showFactorManager, setShowFactorManager] = useState(false);
          const [lastActiveFloorId, setLastActiveFloorId] = useState(null);
          const [collapsedFloors, setCollapsedFloors] = useState({});
          const [draggedFloorIdx, setDraggedFloorIdx] = useState(null);
          const [dragOverFloorIdx, setDragOverFloorIdx] = useState(null);
          const [draggedBuildingIdx, setDraggedBuildingIdx] = useState(null);
          const [dragOverBuildingIdx, setDragOverBuildingIdx] = useState(null);
          const [draggedRoomId, setDraggedRoomId] = useState(null);
          const [dragOverRoomId, setDragOverRoomId] = useState(null);
          
          // Modals untuk Ruangan
          const [moveModal, setMoveModal] = useState({ isOpen: false, targetFloorId: '' });
          const [copyRoomModal, setCopyRoomModal] = useState({ isOpen: false, targetFloorId: '' });
          
          // Modals untuk Lantai
          const [duplicateModal, setDuplicateModal] = useState({ isOpen: false, floorId: null, targetBuildingId: '', count: 1 });
          const [moveFloorModal, setMoveFloorModal] = useState({ isOpen: false, floorId: null, targetBuildingId: '' });

          // Modals untuk Gedung
          const [duplicateBuildingModal, setDuplicateBuildingModal] = useState({ isOpen: false, buildingId: null, count: 1 });
          
          const [selectedRoomIds, setSelectedRoomIds] = useState([]);
          const [reportSortBy, setReportSortBy] = useState('default');
          const [isExportingExcel, setIsExportingExcel] = useState(false);
          const [isPrinting, setIsPrinting] = useState(false);
          const [isAutosaving, setIsAutosaving] = useState(false);
          const [aiLoadingState, setAiLoadingState] = useState({});
          
          const [activeRowId, setActiveRowId] = useState(null);
          const [dialog, setDialog] = useState({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });

          // Auto-Suggestion State Management
          const roomsRef = useRef(rooms);
          useEffect(() => { roomsRef.current = rooms; }, [rooms]);

          const [suggestions, setSuggestions] = useState({ names: [], notes: [] });

          const updateSuggestions = useCallback(() => {
              const reversedRooms = [...roomsRef.current].reverse();
              setSuggestions({
                  names: Array.from(new Set(reversedRooms.map(r => r.label).filter(n => n && n.trim() !== '' && n !== 'Ruang Baru'))),
                  notes: Array.from(new Set(reversedRooms.map(r => r.notes).filter(n => n && n.trim() !== '')))
              });
          }, []);

          useEffect(() => { updateSuggestions(); }, [rooms.length, updateSuggestions]);

          const showAlert = useCallback((message, title = "Informasi") => setDialog({ isOpen: true, title, message, type: 'alert', onConfirm: null }), []);
          const showConfirm = useCallback((message, onConfirm, title = "Konfirmasi") => setDialog({ isOpen: true, title, message, type: 'confirm', onConfirm }), []);
          const fileInputRef = useRef(null);
          const getZoneStyle = (colorId) => ZONE_COLORS.find(c => c.id === colorId) || ZONE_COLORS[0];

          useEffect(() => {
            if (!activeBuildingId && buildings.length > 0) setActiveBuildingId(buildings[0].id);
            else if (activeBuildingId && !buildings.find(b => b.id === activeBuildingId)) setActiveBuildingId(buildings[0]?.id || null);
          }, [buildings, activeBuildingId]);

          useEffect(() => {
            const timeoutId = setTimeout(() => {
              try { localStorage.setItem('spacePlannerState', JSON.stringify(appState)); setIsAutosaving(true); setTimeout(() => setIsAutosaving(false), 2000); } catch (e) { console.error("Autosave gagal", e); }
            }, 1000); 
            return () => clearTimeout(timeoutId);
          }, [appState]);

          const stats = useMemo(() => {
            const safeNum = (val) => Number(val) || 0;
            const lArea = safeNum(landArea);
            const kLimit = safeNum(kdbLimit);
            const ktLimit = safeNum(ktbLimit);
            const klLimit = safeNum(klbLimit);

            let globalNettoTotal = 0; let globalBrutoTotal = 0;
            let globalFootprintArea = 0; let globalBasementFootprintArea = 0;
            let globalOccupantsTotal = 0;
            const globalFactorAreas = {}; factors.forEach(fac => globalFactorAreas[fac.id] = 0);

            const floorDetails = floors.map(f => {
              let occupantsFloor = 0;
              const nettoFloor = rooms.filter(r => r.floorId === f.id).reduce((acc, r) => {
                const count = safeNum(r.count);
                const headCount = (r.occupants !== undefined && r.occupants !== '') ? safeNum(r.occupants) * count : 0;
                occupantsFloor += headCount;
                return acc + (count * safeNum(r.std));
              }, 0);
              
              let totalMultiplier = 0;
              factors.forEach(fac => {
                const val = safeNum(f.factorValues?.[fac.id]);
                totalMultiplier += val;
                globalFactorAreas[fac.id] += (nettoFloor * val) / 100;
              });

              const brutoFloor = nettoFloor * (1 + totalMultiplier / 100);
              globalNettoTotal += nettoFloor; globalBrutoTotal += brutoFloor; globalOccupantsTotal += occupantsFloor;
              
              return { ...f, netto: nettoFloor, bruto: brutoFloor, totalMultiplier, occupants: occupantsFloor };
            });

            const buildingDetails = buildings.map(b => {
              const bFloors = floorDetails.filter(fd => fd.buildingId === b.id);
              const bNetto = bFloors.reduce((acc, fd) => acc + fd.netto, 0);
              const bBruto = bFloors.reduce((acc, fd) => acc + fd.bruto, 0);
              const bOccupants = bFloors.reduce((acc, fd) => acc + fd.occupants, 0);
              const bFootprint = bFloors.find(fd => fd.id === b.kdbFloorId)?.bruto || 0;
              const bBasementFootprint = bFloors.find(fd => fd.id === b.ktbFloorId)?.bruto || 0;
              
              globalFootprintArea += bFootprint; globalBasementFootprintArea += bBasementFootprint;

              const heightAbove = bFloors.filter(f => !f.isBasement).reduce((acc, f) => acc + Math.abs(safeNum(f.floorHeight)), 0);
              const depthBelow = bFloors.filter(f => f.isBasement).reduce((acc, f) => acc + Math.abs(safeNum(f.floorHeight)), 0);

              const bZoneBreakdown = zones.map(z => {
                let zNettoArea = 0; let zBrutoArea = 0;
                rooms.filter(r => r.zoneId === z.id && bFloors.some(f => f.id === r.floorId)).forEach(r => {
                  const count = safeNum(r.count);
                  const rNetto = count * safeNum(r.std);
                  zNettoArea += rNetto;
                  const floor = floors.find(f => f.id === r.floorId);
                  let globalMultiplier = 0;
                  if (floor && floor.factorValues) { factors.filter(fac => !fac.zoneId).forEach(fac => { globalMultiplier += safeNum(floor.factorValues[fac.id]); }); }
                  zBrutoArea += rNetto * (1 + globalMultiplier / 100);
                });
                bFloors.forEach(f => { factors.filter(fac => fac.zoneId === z.id).forEach(fac => { zBrutoArea += (f.netto * safeNum(f.factorValues?.[fac.id])) / 100; }); });
                return { id: z.id, name: z.label, area: zNettoArea, brutoArea: zBrutoArea, style: getZoneStyle(z.colorId) };
              });

              return { ...b, floors: bFloors, netto: bNetto, bruto: bBruto, footprint: bFootprint, basementFootprint: bBasementFootprint, heightAbove, depthBelow, zoneBreakdown: bZoneBreakdown, occupants: bOccupants };
            });

            const currentKDB = lArea > 0 ? (globalFootprintArea / lArea) * 100 : 0;
            const currentKTB = lArea > 0 ? (globalBasementFootprintArea / lArea) * 100 : 0;
            const currentKLB = lArea > 0 ? globalBrutoTotal / lArea : 0;
            
            const maxAllowedKLBArea = lArea * klLimit;
            const maxAllowedKDBArea = (kLimit / 100) * lArea;
            const maxAllowedKTBArea = (ktLimit / 100) * lArea;
            const minRequiredKDHArea = (safeNum(kdhLimit) / 100) * lArea;
            
            const zoneBreakdown = zones.map(z => {
              let nettoArea = 0; let brutoArea = 0;
              rooms.filter(r => r.zoneId === z.id).forEach(r => {
                const count = safeNum(r.count);
                const rNetto = count * safeNum(r.std);
                nettoArea += rNetto;
                const floor = floors.find(f => f.id === r.floorId);
                let globalMultiplier = 0;
                if (floor && floor.factorValues) { factors.filter(fac => !fac.zoneId).forEach(fac => { globalMultiplier += safeNum(floor.factorValues[fac.id]); }); }
                brutoArea += rNetto * (1 + globalMultiplier / 100);
              });
              floorDetails.forEach(f => { factors.filter(fac => fac.zoneId === z.id).forEach(fac => { brutoArea += (f.netto * safeNum(f.factorValues?.[fac.id])) / 100; }); });
              return { id: z.id, name: z.label, area: nettoArea, brutoArea: brutoArea, style: getZoneStyle(z.colorId) };
            });

            const parkingStats = {
                totalArea: 0,
                totalCount: 0,
                details: parkingRules.map(rule => {
                    let baseValue = 0; let basisLabel = '';
                    if (rule.basis === 'gfa') { baseValue = globalBrutoTotal; basisLabel = 'Total GFA Kawasan'; }
                    else if (rule.basis === 'occupants') { baseValue = globalOccupantsTotal; basisLabel = 'Total Penghuni Kawasan'; }
                    else if (rule.basis === 'zone') {
                        if (rule.targetZoneIds && rule.targetZoneIds.length > 0) {
                            let combinedArea = 0; let zoneNames = [];
                            rule.targetZoneIds.forEach(zId => {
                                const zStats = zoneBreakdown.find(z => z.id === zId);
                                if (zStats) { combinedArea += zStats.brutoArea; zoneNames.push(zStats.name); }
                            });
                            baseValue = combinedArea; basisLabel = `Zona ${zoneNames.join(', ')}`;
                        } else { baseValue = 0; basisLabel = 'Pilih Zona Target'; }
                    }

                    const count = rule.ratio > 0 ? Math.ceil(baseValue / rule.ratio) : 0;
                    const area = count * rule.areaPerVehicle;
                    return { ...rule, baseValue, basisLabel, count, area };
                })
            };
            parkingStats.totalArea = parkingStats.details.reduce((sum, d) => sum + d.area, 0);
            parkingStats.totalCount = parkingStats.details.reduce((sum, d) => sum + d.count, 0);
            parkingStats.remainingSurfaceArea = lArea - globalFootprintArea;

            return { 
              nettoTotal: globalNettoTotal, brutoTotal: globalBrutoTotal, occupantsTotal: globalOccupantsTotal, footprint: globalFootprintArea, basementFootprint: globalBasementFootprintArea,
              floorDetails, buildingDetails, zoneBreakdown, parkingStats, currentKDB, currentKTB, currentKLB, maxAllowedKLBArea, maxAllowedKDBArea, maxAllowedKTBArea, minRequiredKDHArea, factorAreas: globalFactorAreas
            };
          }, [rooms, floors, buildings, zones, factors, parkingRules, landArea, ktbLimit, kdhLimit, klbLimit, kdbLimit]);

          // ACTIONS
          const handleNewProject = useCallback(() => {
            showConfirm("Mulai proyek baru? Pastikan sudah disimpan.", () => { setAppState(INITIAL_APP_STATE); setActiveBuildingId(INITIAL_APP_STATE.buildings[0].id); setCollapsedFloors({}); localStorage.removeItem('spacePlannerState'); }, "Buat Proyek Baru");
          }, [setAppState, showConfirm]);

          const addBuilding = () => {
            const newId = `b${Date.now()}`; const newFloorId = `f${Date.now()}`; const initialFactors = {}; factors.forEach(fac => initialFactors[fac.id] = fac.defaultVal || 0);
            setAppState(prev => ({ ...prev, buildings: [...prev.buildings, { id: newId, name: `Gedung ${prev.buildings.length + 1}`, kdbFloorId: newFloorId, ktbFloorId: '', notes: '' }], floors: [...prev.floors, { id: newFloorId, buildingId: newId, name: 'Lantai Dasar', isBasement: false, floorHeight: 4.0, factorValues: initialFactors }] }));
            setActiveBuildingId(newId);
          };

                                            </div>

                                    <div className="flex items-start justify-between mb-6">

                                            {LandPlot && <LandPlot className="w-6 h-6" />}
                                        </div>
                                    </div>
                                    
                                    <div className="text-4xl md:text-5xl font-black font-mono text-zinc-800 mb-2 print:text-black">
                                        {stats.parkingStats.remainingSurfaceArea.toFixed(1)} <span className="text-xl font-bold font-sans uppercase tracking-widest text-zinc-400">m²</span>
                                    </div>
                                    <div className="text-sm font-bold text-zinc-500">

                                    </div>
                                </div>

                                        </div>
                                    ) : (
                                        <div className="text-xs font-bold text-emerald-600 flex gap-2 items-start print:text-black">

                                                    <button onClick={() => removeParkingRule(rule.id)} className="text-zinc-400 hover:text-rose-500 bg-white p-1.5 rounded-md shadow-sm border border-zinc-200 transition-colors">
                                                        {Trash2 && <Trash2 className="w-4 h-4" />}
                                                    </button>
                                                </div>
                                                
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    <div>
                                                        <label className="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1.5">Kendaraan</label>

                                                            <option value="Motor">🏍️ Motor</option>
                                                            <option value="Bus/Truk">🚌 Bus/Truk</option>
                                                            <option value="Sepeda">🚲 Sepeda</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1.5">Luas/Unit (m²)</label>

                                                    <div className="col-span-2">
                                                        <label className="text-[9px] font-black text-zinc-400 uppercase tracking-widest block mb-1.5">Basis Hitungan</label>

                                                            <option value="zone">Luas Bruto Zona Spesifik</option>

                                                                {zones.map(z => {
                                                                    const isSelected = (rule.targetZoneIds || []).includes(z.id);

                                                                                const newIds = isSelected ? currentIds.filter(id => id !== z.id) : [...currentIds, z.id];
                                                                                updateParkingRule(rule.id, 'targetZoneIds', newIds);
                                                                            }}

                                                                            {z.label}
                                                                        </button>

                                                                })}
                                                            </div>
                                                        </div>
                                                    )}

                                                <div className="bg-blue-50/50 border border-blue-100 rounded-md p-3 flex items-center gap-3">

                                                    <input type="number" value={rule.ratio} onChange={(e) => updateParkingRule(rule.id, 'ratio', Number(e.target.value))} className="w-20 bg-white border border-blue-200 rounded-md px-2 py-1 text-center text-sm font-mono font-black text-blue-700 outline-none focus:ring-2 focus:ring-blue-400" />
                                                    <span className="text-xs font-bold text-blue-800">{rule.basis === 'occupants' ? 'Orang/Penghuni' : 'm² Luas Bangunan'}</span>
                                                </div>
                                            </div>

                                            {/* Kolom Kanan: Output Kalkulasi (Selalu tampil termasuk saat print) */}
                                            <div className="w-full lg:w-64 bg-zinc-900 rounded-lg p-5 text-white flex flex-col justify-center relative overflow-hidden print:bg-white print:text-black print:border print:border-black print:w-full">
                                                {/* Background Pattern */}
                                                <div className="absolute -right-4 -bottom-4 opacity-5 print:hidden">
                                                    {ParkingCircle ? <ParkingCircle className="w-32 h-32" /> : <Car className="w-32 h-32" />}
                                                </div>
                                                
                                                <div className="relative z-10">
                                                    <div className="text-[10px] font-bold text-zinc-400 uppercase tracking-widest mb-1 print:text-zinc-500">Hasil: {rule.name}</div>
                                                    <div className="flex items-baseline gap-2 mb-4">
                                                        <span className="text-4xl font-black font-mono text-emerald-400 print:text-black">{statDetail ? statDetail.count : 0}</span>
                                                        <span className="text-sm font-bold uppercase tracking-wider text-zinc-300 print:text-zinc-600">{rule.vehicleType}</span>
                                                    </div>
                                                    
                                                    <div className="space-y-1.5 border-t border-zinc-700 pt-3 print:border-zinc-300">

                                                        </div>

                                                            <span className="text-zinc-400 print:text-zinc-600">Butuh Area Parkir</span>
                                                            <span className="font-bold font-mono text-blue-300 print:text-black">{statDetail ? statDetail.area.toLocaleString('id-ID') : 0} m²</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    );
                                })}
                                
                                {parkingRules.length === 0 && (

                                        <button onClick={addParkingRule} className="px-6 py-2.5 bg-zinc-800 text-white rounded-md text-sm font-black uppercase tracking-widest hover:bg-zinc-900 transition-colors shadow-sm">
                                            Tambah Aturan Pertama
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )}

                {/* DASHBOARD UMUM UNTUK TAB INPUT DAN REPORT */}
                {activeTab !== 'parking' && (
                    <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 mb-6 print:mb-6">
                      <ComplianceBadge label="KDB Kawasan" isOk={stats.currentKDB <= (Number(kdbLimit)||0)} current={stats.currentKDB} limit={kdbLimit} unit="%" subText={<React.Fragment><div className="mb-0.5">Terdesain: {stats.footprint.toFixed(1)} m²</div><div>Maks: {stats.maxAllowedKDBArea.toFixed(1)} m²</div></React.Fragment>} />
                      <ComplianceBadge label="KTB Kawasan" isOk={stats.currentKTB <= (Number(ktbLimit)||0)} current={stats.currentKTB} limit={ktbLimit} unit="%" subText={<React.Fragment><div className="mb-0.5">Terdesain: {stats.basementFootprint.toFixed(1)} m²</div><div>Maks: {stats.maxAllowedKTBArea.toFixed(1)} m²</div></React.Fragment>} />
                      
                      {/* FIXED KDH BOX TO ALIGN WITH OTHERS */}
                      <div className="p-4 rounded-md border flex flex-col h-full transition-all bg-emerald-50/50 border-emerald-200 text-emerald-800 print:border-zinc-300 print:bg-transparent">
                        <div className="flex items-center justify-between mb-2">
                          <span className="text-[10px] font-bold uppercase tracking-wider opacity-80 print:text-black">KDH (Area Hijau)</span>
                          {Info && <Info className="w-4 h-4 print:text-black" />}

                        <div className="flex items-baseline gap-1">
                          <span className="text-xl font-black font-mono print:text-black">{kdhLimit}</span>
                          <span className="text-[10px] font-bold opacity-60 print:text-black">% MIN</span>
                        </div>
                        <div className="mt-auto pt-2">
                          <div className="text-[9px] font-bold opacity-80 uppercase tracking-tighter leading-tight print:text-black">Min: {stats.minRequiredKDHArea.toFixed(1)} m²</div>
                        </div>
                      </div>

                      <ComplianceBadge label="KLB (FAR) Kawasan" isOk={stats.currentKLB <= (Number(klbLimit)||0)} current={stats.currentKLB} limit={klbLimit} subText={<React.Fragment><div className="mb-0.5">Terdesain: {stats.brutoTotal.toFixed(1)} m²</div><div>Maks: {stats.maxAllowedKLBArea.toFixed(1)} m²</div></React.Fragment>} />
                      
                      <div className="bg-zinc-900 p-4 rounded-md text-white flex flex-col h-full shadow-sm col-span-2 print:bg-white print:text-black print:border print:border-zinc-300 print:shadow-none">

                          <span className="text-[10px] font-bold uppercase tracking-wider print:text-black">TOTAL TERDESAIN</span>
                          {FileText && <FileText className="w-4 h-4 print:hidden" />}
                        </div>
                        <div className="text-2xl font-black font-mono">
                          {stats.brutoTotal.toFixed(1)} <span className="text-xs font-sans font-normal">m²</span>
                        </div>
                        <div className="mt-auto pt-2">
                          <div className={`text-[9px] font-bold uppercase tracking-tighter print:text-black flex justify-between items-center gap-2 ${stats.brutoTotal > stats.maxAllowedKLBArea ? 'text-rose-400' : 'text-blue-300'}`}>
                            <span className="truncate font-mono">Sisa KLB: {(stats.maxAllowedKLBArea - stats.brutoTotal).toFixed(1)} m²</span>
                            <span className={`px-1.5 py-0.5 rounded border shrink-0 font-mono ${stats.brutoTotal > stats.maxAllowedKLBArea ? 'bg-rose-950/50 border-rose-500/20' : 'bg-white/10 border-white/5'}`}>
                              {stats.maxAllowedKLBArea > 0 ? ((stats.brutoTotal / stats.maxAllowedKLBArea) * 100).toFixed(1) : 0}% Terdesain
                            </span>
                          </div>
                        </div>
                      </div>
                    </div>
                )}

                  <div className="space-y-6">

                      <button 
                        onClick={() => setShowProjectParams(!showProjectParams)}

                      >
                        <div className="flex items-center gap-2 text-sm font-bold text-zinc-800">
                          {LandPlot && <LandPlot className="w-4 h-4 text-zinc-500" />} 
                          Parameter Lahan & Acuan Tapak 
                          {!showProjectParams && <span className="text-[10px] font-normal text-zinc-400 ml-2 border border-zinc-300 px-1.5 py-0.5 rounded uppercase tracking-widest">{landArea} m²</span>}
                        </div>
                        {showProjectParams ? (ChevronDown && <ChevronDown className="w-4 h-4 text-zinc-500" />) : (ChevronRight && <ChevronRight className="w-4 h-4 text-zinc-500" />)}

                                  <div>
                                    <label className="text-[10px] font-bold text-zinc-400 uppercase block mb-1">Luas Lahan (m²)</label>
                                    <input type="number" value={landArea} onChange={(e) => setLandArea(e.target.value)} className="w-full bg-zinc-50 border border-zinc-200 rounded-md px-3 py-2 font-mono font-black text-blue-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all" />

                                </div>

                                </div>
                                <div className="space-y-4">
                                  <div>
                                    <label className="text-[10px] font-bold text-zinc-400 uppercase block mb-1">Maks KTB (%)</label>
                                    <input type="number" value={ktbLimit} onChange={(e) => setKtbLimit(e.target.value)} className="w-full bg-zinc-50 border border-zinc-200 rounded-md px-3 py-2 font-mono font-bold outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all" />
                                  </div>
                                </div>
                                <div className="space-y-4">
                                  <div>
                                    <label className="text-[10px] font-bold text-zinc-400 uppercase block mb-1">Min KDH (%)</label>
                                    <input type="number" value={kdhLimit} onChange={(e) => setKdhLimit(e.target.value)} className="w-full bg-zinc-50 border border-zinc-200 rounded-md px-3 py-2 font-mono font-bold text-emerald-700 outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all" />
                                  </div>
                                </div>
                                <div className="space-y-4">
                                  <div>
                                    <label className="text-[10px] font-bold text-zinc-400 uppercase block mb-1">Maks KLB</label>
                                    <input type="number" step="0.1" value={klbLimit} onChange={(e) => setKlbLimit(e.target.value)} className="w-full bg-zinc-50 border border-zinc-200 rounded-md px-3 py-2 font-mono font-bold outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400 transition-all" />
                                    <div className="text-[9px] mt-1.5 text-zinc-500 font-bold italic tracking-tighter uppercase">
                                      *Est. Maks Lantai: <span className="font-mono">{Number(kdbLimit) > 0 ? (Number(klbLimit) / (Number(kdbLimit) / 100)).toFixed(1) : 0}</span> lt
                                    </div>
                                  </div>
                                </div>
                                <div className="col-span-2 md:col-span-3 lg:col-span-5">
                                    <div className="bg-zinc-100/50 p-3 rounded-md border border-zinc-200/50 text-[10px] text-zinc-500 font-medium">
                                        Parameter ini berlaku untuk <strong className="text-zinc-700">keseluruhan luas lahan</strong>. Footprint KDB dan KTB akan dihitung dari gabungan lantai dasar dan basement dari <strong className="text-blue-600">seluruh gedung</strong> yang ada di dalam masterplan ini.
                                    </div>
                                </div>
                              </div>
                          </div>
                      )}
                    </div>

                    <div className="flex gap-2 flex-wrap items-center">
                      <button onClick={() => setShowFactorManager(!showFactorManager)} className={`flex items-center gap-2 px-4 py-2 rounded-md text-xs font-bold transition-all ${showFactorManager ? 'bg-zinc-800 text-white border border-zinc-800' : 'bg-white text-zinc-700 border border-zinc-200 hover:bg-zinc-50 shadow-sm'}`}>{SlidersHorizontal && <SlidersHorizontal className="w-3.5 h-3.5" />} Atur Faktor Pengali</button>

                    </div>

                    {/* MANAGERS */}
                    {showFactorManager && (
                      <div className="bg-white p-5 rounded-xl border-2 border-zinc-200 shadow-sm animate-in zoom-in-95 duration-200">
                        <div className="flex justify-between items-center mb-4">
                          <h3 className="font-bold text-zinc-800 text-sm flex items-center gap-2">{SlidersHorizontal && <SlidersHorizontal className="w-4 h-4 text-zinc-500" />} Manajemen Faktor Pengali Global</h3>
                          <button onClick={addFactor} className="text-xs font-bold text-blue-600 hover:underline flex items-center gap-1">{PlusCircle && <PlusCircle className="w-3 h-3" />} Tambah Faktor</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

                            <div key={fac.id} className="p-4 rounded-lg border border-zinc-200 bg-zinc-50 flex flex-col gap-3">

                              <div className="flex flex-col gap-2">
                                <div className="flex items-center gap-2">
                                  <div className="flex items-center bg-white border border-zinc-200 rounded-md overflow-hidden w-24 flex-shrink-0 focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-400 transition-all">
                                    <input type="number" step="0.1" value={fac.defaultVal !== undefined ? fac.defaultVal : ''} onChange={(e) => updateFactorDefault(fac.id, e.target.value)} className="w-full px-2 py-1.5 text-sm font-mono font-bold text-blue-700 outline-none text-center" />
                                    <span className="px-2 py-1.5 text-[10px] font-black text-zinc-400 bg-zinc-100 border-l border-zinc-200">%</span>
                                  </div>
                                  <button onClick={() => applyFactorToAllFloors(fac.id)} className="flex-1 bg-zinc-800 hover:bg-zinc-900 text-white text-[10px] font-black uppercase tracking-wider py-2 rounded-md transition-colors shadow-sm" title="Terapkan persentase ini ke semua lantai">
                                    Terapkan Semua
                                  </button>
                                </div>
                                <select value={fac.zoneId || ''} onChange={(e) => updateFactor(fac.id, 'zoneId', e.target.value)} className="w-full text-xs font-bold text-zinc-600 bg-white border border-zinc-200 rounded-md px-2 py-1.5 outline-none focus:ring-1 focus:ring-blue-400 cursor-pointer">
                                    <option value="">-- Target: Global (Seluruh Lantai) --</option>
                                    {zones.map(z => <option key={z.id} value={z.id}>Target Khusus: Zona {z.label}</option>)}
                                </select>
                              </div>
                            </div>
                          ))}
                        </div>
                        <div className="mt-4 text-[10px] font-medium text-zinc-500 flex items-start gap-1.5">
                            {Info && <Info className="w-3.5 h-3.5 text-zinc-400 flex-shrink-0" />}
                            <p>Mengubah pengaturan di atas hanya menjadi nilai *default* untuk lantai baru. Klik <strong>Terapkan Semua</strong> untuk memperbarui seluruh lantai yang ada.</p>
                        </div>
                      </div>
                    )}

                    {showZoneManager && (
                      <div className="bg-white p-5 rounded-xl border-2 border-zinc-200 shadow-sm animate-in zoom-in-95 duration-200">

                          <h3 className="font-bold text-zinc-800 text-sm flex items-center gap-2">{Palette && <Palette className="w-4 h-4 text-zinc-500" />} Manajemen Zoning</h3>
                          <button onClick={addZone} className="text-xs font-bold text-blue-600 hover:underline flex items-center gap-1">{PlusCircle && <PlusCircle className="w-3 h-3" />} Tambah Zona</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-3">
                          {zones.map(z => (
                            <div key={z.id} className={`p-3 rounded-lg border flex flex-col gap-2 ${getZoneStyle(z.colorId).color.split(' ')[0]} bg-opacity-30`}>
                              <div className="flex items-center justify-between">
                                <input type="text" value={z.label} onChange={(e) => updateZone(z.id, 'label', e.target.value)} className="bg-white/70 border-none rounded px-2 py-1 text-xs font-bold text-zinc-800 w-full mr-2 outline-none focus:ring-1 focus:ring-black/20" />
                                <button onClick={() => removeZone(z.id)} className="text-black/40 hover:text-rose-600">{X && <X className="w-3.5 h-3.5" />}</button>
                              </div>
                              <div className="flex flex-wrap gap-1 mt-1">

                                  <button key={c.id} onClick={() => updateZone(z.id, 'colorId', c.id)} className={`w-4 h-4 rounded-full border-2 ${c.color.split(' ')[0]} ${z.colorId === c.id ? 'border-zinc-800 scale-110' : 'border-transparent hover:border-black/20'} transition-all`} title={c.id} />
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    <div className="space-y-4">
                      
                      {/* TABS GEDUNG */}
                      <div className="flex items-center gap-1 overflow-x-auto pb-1 border-b-2 border-zinc-200">
                         {buildings.map((b, idx) => (
                            <div 
                                key={b.id} 
                                className={`flex items-center group relative transition-all duration-200 ${draggedBuildingIdx === idx ? 'opacity-40 scale-95' : ''} ${dragOverBuildingIdx === idx && draggedBuildingIdx !== idx ? 'border-l-4 border-l-blue-500 pl-1' : ''}`}
                                draggable 
                                onDragStart={(e) => handleBuildingDragStart(e, idx)} 
                                onDragOver={(e) => handleBuildingDragOver(e, idx)} 
                                onDrop={(e) => handleBuildingDrop(e, idx)} 
                                onDragEnd={handleBuildingDragEnd}
                            >
                                <button 
                                    onClick={() => setActiveBuildingId(b.id)}
                                    className={`flex items-center gap-2 whitespace-nowrap pl-4 pr-8 py-2.5 font-bold text-sm rounded-t-lg transition-all border-x border-t cursor-pointer ${activeBuildingId === b.id ? 'bg-white text-zinc-900 border-zinc-300 shadow-[0_-2px_4px_rgba(0,0,0,0.02)]' : 'bg-zinc-100 text-zinc-500 border-zinc-200 hover:bg-zinc-200'}`}
                                >
                                    <span className={`cursor-grab active:cursor-grabbing ${activeBuildingId === b.id ? 'text-zinc-400 hover:text-zinc-800' : 'text-zinc-400 hover:text-zinc-600'}`} title="Tahan dan geser untuk memindahkan gedung">
                                      {GripVertical && <GripVertical className="w-3.5 h-3.5" />}
                                    </span>
                                    {b.name}
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); removeBuilding(b.id); }} 
                                    className={`absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded-md transition-colors ${activeBuildingId === b.id ? 'text-zinc-400 hover:text-white hover:bg-rose-500 opacity-100' : 'opacity-0 hidden'}`}
                                >
                                    {X && <X className="w-3 h-3" />}
                                </button>
                            </div>
                         ))}
                         <button onClick={addBuilding} className="flex items-center gap-1.5 px-4 py-2.5 ml-1 text-sm font-bold text-zinc-600 hover:bg-zinc-200 rounded-t-lg transition-colors border border-dashed border-zinc-300">
                            {Plus && <Plus className="w-4 h-4" />} Tambah Gedung
                         </button>
                      </div>

                      {/* EDITOR GEDUNG AKTIF */}
                      {activeBuilding && (
                          <div className="bg-white p-4 md:p-6 rounded-b-xl border border-t-0 border-zinc-300 mb-8 animate-in fade-in shadow-sm min-h-[50vh]">
                              
                              <div className="flex justify-between items-center mb-5 pb-4 border-b border-zinc-100 px-1">
                                 <div className="text-xs font-black text-zinc-800 uppercase tracking-widest flex items-center gap-2">
                                     {Building && <Building className="w-4 h-4 text-zinc-500" />} {activeBuilding.name}
                                 </div>
                                 <button 
                                     onClick={() => setDuplicateBuildingModal({ isOpen: true, buildingId: activeBuilding.id, count: 1 })} 
                                     className="text-xs font-bold flex items-center gap-1.5 text-zinc-600 bg-white border border-zinc-200 hover:bg-zinc-50 hover:border-zinc-300 px-3 py-1.5 rounded-md shadow-sm transition-colors"
                                 >
                                     {Copy && <Copy className="w-3.5 h-3.5" />} Duplikasi Gedung
                                 </button>
                              </div>

                              <div className="flex flex-col gap-6 mb-8 bg-zinc-50 p-5 rounded-lg border border-zinc-200">
                                  <div className="flex flex-col md:flex-row gap-6 items-start">
                                      <div className="flex-1 w-full">
                                          <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">Nama Gedung</label>
                                          <input 
                                            type="text" 
                                            value={activeBuilding.name} 
                                            onChange={(e) => updateBuilding(activeBuilding.id, 'name', e.target.value)} 
                                            className="w-full bg-white border border-zinc-300 rounded-md px-3 py-2 font-bold text-zinc-800 text-base focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-shadow" 
                                          />
                                      </div>
                                      <div className="flex-1 w-full">
                                          <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">Acuan Footprint (KDB)</label>
                                          <select 
                                            value={activeBuilding.kdbFloorId} 
                                            onChange={(e) => updateBuilding(activeBuilding.id, 'kdbFloorId', e.target.value)} 
                                            className="w-full bg-white border border-zinc-300 text-zinc-800 rounded-md px-3 py-2 text-sm font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"

                                            <option value="">-- Tidak Ada / Abaikan --</option>
                                            {activeBuildingFloors.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}

                                          <p className="text-[9px] font-mono text-zinc-400 mt-1.5 pl-1">Sumbangan KDB: {stats.buildingDetails.find(b=>b.id === activeBuilding.id)?.footprint.toFixed(1)} m²</p>
                                      </div>
                                      <div className="flex-1 w-full">
                                          <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block mb-1.5">Acuan Basement (KTB)</label>
                                          <select 
                                            value={activeBuilding.ktbFloorId} 
                                            onChange={(e) => updateBuilding(activeBuilding.id, 'ktbFloorId', e.target.value)} 
                                            className="w-full bg-white border border-zinc-300 text-zinc-800 rounded-md px-3 py-2 text-sm font-medium focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none cursor-pointer"

                                            <option value="">-- Tidak Punya Basement --</option>
                                            {activeBuildingFloors.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                                          </select>
                                          <p className="text-[9px] font-mono text-zinc-400 mt-1.5 pl-1">Sumbangan KTB: {stats.buildingDetails.find(b=>b.id === activeBuilding.id)?.basementFootprint.toFixed(1)} m²</p>
                                      </div>
                                  </div>
                                  
                                  {/* PENAMBAHAN FITUR: CATATAN/KETERANGAN GEDUNG */}
                                  <div className="w-full pt-2 border-t border-zinc-200/60 mt-2">
                                      <div className="flex justify-between items-center mb-1.5">
                                          <label className="text-[10px] font-black text-zinc-500 uppercase tracking-widest block">Catatan / Spesifikasi Gedung (Opsional)</label>
                                          <button 
                                              onClick={() => handleEnhanceBuildingNote(activeBuilding.id, activeBuilding.name, activeBuilding.notes)}

                                          >
                                              {aiLoadingState[`building_note_${activeBuilding.id}`] ? <Loader2 className="w-3 h-3 animate-spin" /> : <Sparkles className="w-3 h-3" />}
                                              {aiLoadingState[`building_note_${activeBuilding.id}`] ? 'Memproses...' : 'Percantik AI'}
                                          </button>
                                      </div>
                                      <textarea 
                                          rows="2"
                                          value={activeBuilding.notes || ''} 
                                          onChange={(e) => updateBuilding(activeBuilding.id, 'notes', e.target.value)} 
                                          placeholder="Ketik spesifikasi struktur, fasad, atau fungsi khusus gedung di sini..." 
                                          className="w-full bg-white border border-zinc-300 rounded-md px-3 py-2 text-sm font-medium text-zinc-700 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none resize-none transition-shadow" 
                                      />
                                  </div>
                              </div>

                              {activeBuildingFloors.length >= 2 && (
                                <button onClick={() => addFloor('top')} className={`w-full flex items-center justify-center gap-2 py-2.5 mb-6 text-xs font-bold border border-dashed rounded-lg transition-colors bg-zinc-50 border-zinc-300 text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900`}>
                                  {Plus && <Plus className="w-4 h-4" />} Sisipkan Lantai Teratas (Alt+L)
                                </button>
                              )}

                              <div className="space-y-8">
                                  {activeBuildingFloors.map((f, fIdx) => (
                                    <div 
                                        key={f.id} 
                                        draggable={!!collapsedFloors[f.id]} 
                                        onDragStart={(e) => handleDragStart(e, fIdx)} 
                                        onDragOver={(e) => handleDragOver(e, fIdx)} 
                                        onDrop={(e) => handleDrop(e, fIdx)} 
                                        onDragEnd={handleDragEnd} 
                                        className={`bg-white rounded-lg border ${draggedFloorIdx === fIdx ? 'opacity-50 border-blue-400 border-dashed scale-[0.99]' : 'border-zinc-300'} ${dragOverFloorIdx === fIdx && draggedFloorIdx !== fIdx ? 'border-t-4 border-t-blue-500 shadow-md' : ''} shadow-sm overflow-hidden transition-all duration-200 relative group/floor`} 
                                        onFocus={() => setLastActiveFloorId(f.id)} 
                                        onClick={() => setLastActiveFloorId(f.id)}
                                    >
                                      
                                      {/* Indicator KDB/KTB */}
                                      {(activeBuilding.kdbFloorId === f.id || activeBuilding.ktbFloorId === f.id) && (
                                        <div className="absolute top-0 right-0 left-0 h-1 flex z-10">
                                          {activeBuilding.kdbFloorId === f.id && <div className="h-full flex-1 bg-emerald-400" title="Lantai Acuan KDB Gedung Ini"></div>}
                                          {activeBuilding.ktbFloorId === f.id && <div className="h-full flex-1 bg-amber-400" title="Lantai Acuan KTB Gedung Ini"></div>}
                                        </div>
                                      )}
                                      
                                      <div className="bg-zinc-100 px-4 py-3 border-b border-zinc-200 flex flex-col lg:flex-row lg:items-center justify-between gap-4">
                                          <div className="flex items-center gap-3">
                                            <div className={`${collapsedFloors[f.id] ? 'cursor-grab active:cursor-grabbing text-zinc-500 hover:text-zinc-800' : 'cursor-not-allowed text-zinc-300'} transition-colors`} title={collapsedFloors[f.id] ? "Tahan dan geser untuk memindahkan lantai" : "Sembunyikan (tutup) ruangan di lantai ini terlebih dahulu untuk memindahkannya"}>
                                              {GripVertical && <GripVertical className="w-4 h-4" />}
                                            </div>
                                            <button onClick={() => toggleFloorCollapse(f.id)} className="p-1 text-zinc-500 hover:text-zinc-900 hover:bg-zinc-200/50 rounded-md transition-colors" title={collapsedFloors[f.id] ? "Tampilkan Ruangan" : "Sembunyikan Ruangan"}>
                                              {collapsedFloors[f.id] ? (ChevronRight && <ChevronRight className="w-4 h-4" />) : (ChevronDown && <ChevronDown className="w-4 h-4" />)}
                                            </button>
                                            <span className="bg-zinc-800 text-white font-mono text-[9px] font-bold px-1.5 py-0.5 rounded shadow-sm">F{fIdx+1}</span>
                                            <input type="text" value={f.name} onChange={(e) => updateFloorConfig(f.id, 'name', e.target.value)} className="bg-transparent border-none font-bold text-zinc-900 focus:ring-0 p-0 text-base w-40 md:w-auto outline-none focus:bg-white focus:px-2 focus:-ml-2 rounded transition-all" />
                                            
                                            <div className="flex gap-1 ml-1 items-center">
                                              {activeBuilding.kdbFloorId === f.id && <span className="bg-emerald-100 text-emerald-700 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase tracking-widest border border-emerald-200">KDB</span>}
                                              {activeBuilding.ktbFloorId === f.id && <span className="bg-amber-100 text-amber-700 text-[8px] font-bold px-1.5 py-0.5 rounded uppercase tracking-widest border border-amber-200">KTB</span>}
                                              
                                              <div className="flex items-center gap-1.5 border-l border-zinc-300 pl-3 ml-2">
                                                <label className="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">H(m)</label>
                                                <input type="number" step="0.1" value={f.floorHeight !== undefined ? f.floorHeight : ''} onChange={(e) => updateFloorConfig(f.id, 'floorHeight', e.target.value)} className="w-14 text-xs font-mono font-bold text-zinc-800 bg-white border border-zinc-300 rounded p-1 text-center focus:ring-1 focus:ring-blue-500 outline-none" title="Elevasi Lantai (Height)" />
                                              </div>
                                            </div>
                                          </div>
                                          
                                          {!collapsedFloors[f.id] ? (
                                            <div className="flex flex-wrap items-center gap-3 bg-white px-3 py-1.5 rounded-md border border-zinc-200 shadow-sm">
                                              {factors.map((fac, idx) => (
                                                <div key={fac.id} className={`flex items-center gap-1.5 ${idx !== 0 ? 'border-l border-zinc-100 pl-3' : ''}`}>
                                                  <label className="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">{fac.label}</label>
                                                  <input type="number" value={f.factorValues?.[fac.id] !== undefined ? f.factorValues[fac.id] : ''} onChange={(e) => updateFloorFactor(f.id, fac.id, e.target.value)} className="w-10 text-xs font-mono font-bold text-zinc-700 bg-zinc-50 border border-zinc-200 rounded px-1 py-0.5 text-center focus:ring-1 focus:ring-blue-400 outline-none" />
                                                  <span className="text-[9px] text-zinc-400 font-bold">%</span>
                                                </div>
                                              ))}
                                              <div className="flex items-center gap-1.5 border-l border-zinc-200 pl-3 bg-zinc-50 -my-1.5 py-1.5 pr-2 -mr-3 rounded-r-md">
                                                <span className="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Sub</span>
                                                <span className="text-xs font-mono font-black text-zinc-700">+{stats.floorDetails.find(fd => fd.id === f.id)?.totalMultiplier ?? 0}%</span>
                                              </div>
                                            </div>
                                          ) : (
                                            <div className="flex items-center gap-2 bg-white px-3 py-1.5 rounded-md border border-zinc-200 shadow-sm">
                                              <span className="text-[9px] font-bold text-zinc-400 uppercase tracking-widest">Luas Bruto Lantai</span>
                                              <span className="text-sm font-mono font-black text-zinc-800">{stats.floorDetails.find(fd => fd.id === f.id)?.bruto.toFixed(1)} m²</span>
                                            </div>
                                          )}

                                          <div className="flex items-center gap-1 opacity-100 lg:opacity-0 lg:group-hover/floor:opacity-100 transition-opacity">
                                            <button onClick={(e) => { e.stopPropagation(); setMoveFloorModal({ isOpen: true, floorId: f.id, targetBuildingId: activeBuildingId }); }} className="text-zinc-400 hover:text-blue-600 p-1.5 bg-white border border-zinc-200 rounded hover:bg-blue-50 shadow-sm" title="Pindah Gedung">{MoveRight && <MoveRight className="w-3.5 h-3.5" />}</button>
                                            <button onClick={(e) => { e.stopPropagation(); setDuplicateModal({ isOpen: true, floorId: f.id, targetBuildingId: activeBuildingId, count: 1 }); }} className="text-zinc-400 hover:text-zinc-800 p-1.5 bg-white border border-zinc-200 rounded hover:bg-zinc-50 shadow-sm" title="Salin/Duplikasi Lantai">{Copy && <Copy className="w-3.5 h-3.5" />}</button>
                                            <button onClick={(e) => { e.stopPropagation(); removeFloor(f.id); }} className="text-zinc-400 hover:text-white p-1.5 bg-white border border-zinc-200 rounded hover:bg-rose-500 hover:border-rose-500 shadow-sm" title="Hapus Lantai">{Trash2 && <Trash2 className="w-3.5 h-3.5" />}</button>
                                          </div>
                                      </div>

                                      {/* PROGRESSIVE DISCLOSURE: TABLE AREA */}
                                      {!collapsedFloors[f.id] && (
                                        <div className="relative">
                                          {selectedRoomIds.some(id => rooms.find(r => r.id === id)?.floorId === f.id) && (
                                            <div className="absolute top-0 left-0 right-0 z-30 bg-blue-600/95 backdrop-blur px-4 py-2 border-b border-blue-700 flex justify-between items-center animate-in fade-in duration-200 shadow-md">
                                              <span className="text-xs font-black text-white uppercase tracking-widest">
                                                {selectedRoomIds.filter(id => rooms.find(r => r.id === id)?.floorId === f.id).length} Ruang Terpilih
                                              </span>
                                              <div className="flex gap-2">
                                                <button onClick={() => setMoveModal({ isOpen: true, targetFloorId: '' })} className="flex items-center gap-1 text-[10px] font-bold bg-white/20 text-white hover:bg-white hover:text-blue-700 px-3 py-1.5 rounded transition-all">
                                                  {MoveRight && <MoveRight className="w-3.5 h-3.5" />} Pindah Lantai
                                                </button>
                                                <button onClick={() => setCopyRoomModal({ isOpen: true, targetFloorId: '' })} className="flex items-center gap-1 text-[10px] font-bold bg-white/20 text-white hover:bg-white hover:text-blue-700 px-3 py-1.5 rounded transition-all">
                                                  {Copy && <Copy className="w-3.5 h-3.5" />} Salin (Copy)
                                                </button>
                                                <button onClick={() => bulkDeleteRooms(f.id)} className="flex items-center gap-1 text-[10px] font-bold bg-rose-500 text-white hover:bg-rose-600 px-3 py-1.5 rounded transition-all shadow-sm">
                                                  {Trash2 && <Trash2 className="w-3.5 h-3.5" />} Hapus
                                                </button>
                                              </div>
                                            </div>
                                          )}
                                          
                                          {/* STICKY TABLE IMPLEMENTATION */}
                                          <div className="overflow-y-auto max-h-[500px] custom-scroll relative bg-white">
                                              <table className="w-full text-sm text-left border-collapse">
                                                <thead className="sticky top-0 z-20 bg-zinc-100/95 backdrop-blur-[2px] shadow-[0_1px_2px_rgba(0,0,0,0.05)] border-b border-zinc-200">
                                                  <tr>
                                                    <th className="py-2.5 px-2 w-14 text-center border-r border-zinc-200/50">
                                                      <input 
                                                        type="checkbox" 
                                                        className="w-3.5 h-3.5 rounded border-zinc-300 text-blue-600 focus:ring-blue-500 cursor-pointer"
                                                        checked={rooms.filter(r => r.floorId === f.id).length > 0 && rooms.filter(r => r.floorId === f.id).every(r => selectedRoomIds.includes(r.id))}
                                                        onChange={() => toggleAllRoomsInFloor(f.id, rooms.filter(r => r.floorId === f.id).map(r => r.id))}
                                                      />
                                                    </th>
                                                    <th className="py-2.5 px-4 w-28 text-[10px] font-bold text-zinc-500 uppercase tracking-widest cursor-pointer hover:text-zinc-800 group select-none border-r border-zinc-200/50" onClick={() => sortRoomsInFloor(f.id, 'zone')}>
                                                      <div className="flex items-center gap-1">Zoning {ArrowUpDown && <ArrowUpDown className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" />}</div>
                                                    </th>
                                                    <th className="py-2.5 px-3 min-w-[160px] text-[10px] font-bold text-zinc-500 uppercase tracking-widest cursor-pointer hover:text-zinc-800 group select-none border-r border-zinc-200/50" onClick={() => sortRoomsInFloor(f.id, 'name')}>
                                                      <div className="flex items-center gap-1">Nama Ruangan {ArrowUpDown && <ArrowUpDown className="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity" />}</div>
                                                    </th>
                                                    <th className="py-2.5 px-2 text-center w-14 text-[10px] font-bold text-zinc-500 uppercase tracking-widest border-r border-zinc-200/50">Jml</th>
                                                    <th className="py-2.5 px-2 text-center w-20 text-[10px] font-bold text-zinc-500 uppercase tracking-widest border-r border-zinc-200/50">m²/Unit</th>
                                                    <th className="py-2.5 px-3 text-center w-24 text-[10px] font-bold text-zinc-800 uppercase tracking-widest bg-zinc-200/50 border-r border-zinc-300">Luas (m²)</th>
                                                    <th className="py-2.5 px-2 text-center w-16 text-[10px] font-bold text-zinc-500 uppercase tracking-widest border-r border-zinc-200/50" title="Kapasitas">Orang</th>
                                                    <th className="py-2.5 px-3 text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Keterangan</th>
                                                    <th className="py-2.5 px-2 w-10"></th>
                                                  </tr>
                                                </thead>
                                                <tbody className="divide-y divide-zinc-100">
                                                  {rooms.filter(r => r.floorId === f.id).map((room) => {
                                                    const z = zones.find(z => z.id === room.zoneId) || zones[0];
                                                    const isSelected = selectedRoomIds.includes(room.id);
                                                    const isFocused = activeRowId === room.id;
                                                    
                                                    return (
                                                      <tr 
                                                        key={room.id}

                                                        onDragStart={(e) => handleRoomDragStart(e, room.id)}

                                                        <td className="py-2 px-2 border-r border-zinc-100">
                                                          <div className="flex items-center justify-center gap-1.5">
                                                            <div className="cursor-grab active:cursor-grabbing text-zinc-400 hover:text-zinc-600 opacity-20 group-hover/row:opacity-100 transition-opacity" title="Tahan dan geser untuk pindah posisi">

                                                        <td className="py-2 px-3 border-r border-zinc-100">
                                                            <select 
                                                                data-grid-id={`${room.id}-zone`}

                                                                onFocus={() => setActiveRowId(room.id)}
                                                                onKeyDown={(e) => handleRoomGridNav(e, f.id, room.id, 'zone')}
                                                                className={`text-[9px] font-bold rounded px-1.5 py-1 border border-transparent cursor-pointer w-full focus:ring-1 focus:ring-blue-400 outline-none ${getZoneStyle(z.colorId).color}`}

                                                            </select>
                                                        </td>
                                                        <td className="py-2 px-2 border-r border-zinc-100">
                                                            <input 
                                                                id={`room-name-input-${room.id}`}
