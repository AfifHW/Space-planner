                                                    <td className="py-3 px-2"><input type="number" value={room.count} onChange={(e) => updateRoom(room.id, 'count', e.target.value)} onKeyDown={(e) => handleRoomKeyDown(e, f.id)} className="w-full bg-slate-50 border border-slate-200 rounded-lg text-center font-bold py-1 px-1" /></td>
                                                    <td className="py-3 px-2"><input type="number" step="0.1" value={room.std} onChange={(e) => updateRoom(room.id, 'std', e.target.value)} onKeyDown={(e) => handleRoomKeyDown(e, f.id)} className="w-full bg-slate-50 border border-slate-200 rounded-lg text-center font-bold py-1 px-1" /></td>
                                                    <td className="py-3 px-4 text-center font-bold text-slate-700">{((Number(room.count) || 0) * (Number(room.std) || 0)).toFixed(1)}</td>
                                                    <td className="py-3 px-2"><input type="text" list="reference-options" value={room.notes || ''} onChange={(e) => updateRoom(room.id, 'notes', e.target.value)} onKeyDown={(e) => handleRoomKeyDown(e, f.id)} placeholder="Ref. standar..." className="w-full bg-transparent border-none font-medium text-slate-500 text-[11px] italic focus:ring-1 focus:ring-indigo-100 rounded px-2 py-1" /></td>
                                                    <td className="py-3 px-2 text-center"><button onClick={() => removeRoom(room.id)} className="text-slate-200 hover:text-rose-500 opacity-0 group-hover:opacity-100">{X && <X className="w-4 h-4" />}</button></td>
                                                  </tr>
                                                );
                                              })}
                                              <tr>
                                                <td colSpan={7} className="py-3 px-6">
                                                  <button onClick={() => addRoom(f.id)} className="w-full flex items-center justify-center gap-2 py-2.5 text-xs font-bold text-indigo-600 bg-indigo-50/50 hover:bg-indigo-100/80 border border-dashed border-indigo-300 rounded-xl transition-all">
                                                    {PlusCircle && <PlusCircle className="w-4 h-4" />} Tambah Ruang Baru (Enter)
                                                  </button>
                                                </td>
                                              </tr>
                                            </tbody>
                                            <tfoot>
                                              <tr className="bg-slate-50/50 text-[11px] font-black">
                                                <td colSpan={4} className="py-3 px-6 text-right text-slate-400 uppercase">Estimasi Bruto {f.name} (+{stats.floorDetails.find(fd => fd.id === f.id)?.totalMultiplier ?? 0}%)</td>
                                                <td className="py-3 px-4 text-center text-indigo-600">{stats.floorDetails.find(fd => fd.id === f.id)?.bruto.toFixed(1)} m²</td>
                                                <td colSpan={2}></td>
                                              </tr>
                                            </tfoot>
                                          </table>
                                        </div>
                                      )}
                                    </div>
                                  ))}
                              </div>
                              
                              <button onClick={() => addFloor('bottom')} className={`w-full flex items-center justify-center gap-2 py-4 mt-4 text-sm font-bold border-2 border-dashed rounded-2xl transition-all bg-white border-indigo-300 text-indigo-600 hover:bg-indigo-50 hover:border-indigo-400 shadow-sm`}>
                                {Plus && <Plus className="w-5 h-5" />} Tambah Lantai Baru di {activeBuilding.name} (Alt + L)
                              </button>
                          </div>
                      )}
                    </div>
                  </div>
                ) : (
                  <div className="flex flex-col gap-8">
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      
                      {/* Analisis GFA Kawasan */}
                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-slate-300">
                        <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">{PieChart && <PieChart className="w-5 h-5 text-indigo-600 print:text-black" />} Distribusi GFA</h3>
                        <div className="space-y-6 max-h-80 overflow-y-auto pr-2">
                          {stats.buildingDetails.map(b => {
                            const percentage = stats.brutoTotal > 0 ? (b.bruto / stats.brutoTotal) * 100 : 0;
                            return (
                              <div key={b.id}>
                                <div className="flex justify-between items-end border-b border-slate-100 pb-1 mb-3 print:border-slate-300">
                                  <span className="text-[10px] font-black uppercase text-slate-700 print:text-black">
                                    {b.name} <span className="text-slate-400 font-bold ml-1">({percentage.toFixed(1)}%)</span>
                                  </span>
                                  <span className="text-[10px] font-bold text-indigo-600">{b.bruto.toFixed(1)} m²</span>
                                </div>
                                
                                <div className="space-y-3">
                                  {b.floors.map(f => {
                                    const floorPercentage = b.bruto > 0 ? (f.bruto / b.bruto) * 100 : 0;
                                    return (
                                      <div key={f.id}>
                                        <div className="flex justify-between text-[9px] mb-1 font-bold uppercase text-slate-500 print:text-slate-700">
                                          <span>{f.name} <span className="opacity-60 ml-1">({floorPercentage.toFixed(1)}%)</span></span>
                                          <span>{f.bruto.toFixed(1)} m²</span>
                                        </div>
                                        <div className="w-full bg-slate-50 h-1.5 rounded-full overflow-hidden print:border print:border-slate-200">
                                          <div className="bg-indigo-400 h-full print:bg-slate-500" style={{ width: `${floorPercentage}%` }}></div>
                                        </div>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* Komposisi Zona */}
                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-slate-300">
                        <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">{MapIcon && <MapIcon className="w-5 h-5 text-indigo-600 print:text-black" />} Komposisi Zona</h3>
                        <div className="space-y-6 max-h-80 overflow-y-auto pr-2">
                          {stats.buildingDetails.map(b => (
                            <div key={b.id}>
                              <div className="flex justify-between items-end border-b border-slate-100 pb-1 mb-3 print:border-slate-300">
                                <span className="text-[10px] font-black uppercase text-slate-700 print:text-black">{b.name}</span>
                                <span className="text-[10px] font-bold text-emerald-600">{b.netto.toFixed(1)} m²</span>
                              </div>
                              
                              <div className="space-y-3">
                                {b.zoneBreakdown.map(z => {
                                  if (z.area === 0) return null; 
                                  const percentage = b.netto > 0 ? (z.area / b.netto) * 100 : 0;
                                  return (
                                    <div key={z.id}>
                                      <div className="flex justify-between text-[9px] mb-1 font-bold uppercase text-slate-600 print:text-black">
                                        <span>{z.name} <span className="opacity-60 ml-1">({percentage.toFixed(1)}%)</span></span>
                                        <span>{z.area.toFixed(1)} m²</span>
                                      </div>
                                      <div className="w-full bg-slate-50 h-1.5 rounded-full overflow-hidden print:border print:border-slate-200">
                                        <div className={`${z.style.color.split(' ')[0].replace('100', '500')} h-full print:bg-slate-600`} style={{ width: `${percentage}%` }}></div>
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Elevasi per Gedung */}
                      <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm print:break-inside-avoid print:shadow-none print:border-slate-300">
                        <h3 className="font-bold text-slate-800 mb-6 flex items-center gap-2">{Layers && <Layers className="w-5 h-5 text-indigo-600 print:text-black" />} Profil Elevasi Gedung</h3>
                        <div className="flex flex-col gap-4 overflow-y-auto max-h-64 pr-2">
                            {stats.buildingDetails.map(b => (
                                <div key={b.id} className="border-b border-slate-100 pb-3 last:border-0 print:border-slate-300">
                                    <div className="text-[10px] font-black uppercase text-slate-800 mb-2 print:text-black">{b.name}</div>
                                    <div className="flex justify-between items-center text-xs">
                                        <span className="text-indigo-600 font-bold">↑ Atas: +{b.heightAbove.toFixed(2)}m</span>
                                        <span className="text-amber-600 font-bold">↓ Bawah: -{b.depthBelow.toFixed(2)}m</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                      </div>
                    </div>

                    {/* TABEL REPORT PER GEDUNG */}
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden print:shadow-none print:border-none">
                      <div className="p-8 border-b-8 border-indigo-900 bg-slate-50 flex justify-between items-center print:border-b-2 print:border-black print:bg-white print:p-0 print:mb-4">
                        <div><h2 className="text-xl font-black text-slate-900 uppercase">Rincian Luasan Bangunan</h2></div>
                        <div className="flex items-center gap-3 print:hidden" data-html2canvas-ignore="true">
                          <div className="flex items-center bg-slate-100 rounded-xl px-3 py-1.5 border border-slate-200">
                            <span className="text-[10px] font-black text-slate-500 uppercase tracking-widest mr-2 hidden sm:inline">Urutkan:</span>
                            <select value={reportSortBy} onChange={(e) => setReportSortBy(e.target.value)} className="bg-transparent text-xs font-bold text-slate-700 border-none outline-none focus:ring-0 p-0 cursor-pointer">
                              <option value="default">Default</option>
                              <option value="name">Nama Ruang</option>
                              <option value="zone">Zona</option>
                            </select>
                          </div>
                        </div>
                      </div>

                      <div className="p-8 print:p-0 space-y-12">
                        {stats.buildingDetails.map(b => (
                            <div key={b.id} className="break-inside-avoid">
                                <div className="bg-indigo-600 text-white p-3 rounded-t-xl flex justify-between items-center print:bg-slate-300 print:text-black print:border print:border-black">
                                    <h3 className="font-black uppercase tracking-wider">{b.name}</h3>
                                </div>
                                <table className="w-full border-collapse text-xs border border-t-0 border-slate-200 print:border-black">
                                <thead>
                                    <tr className="bg-slate-100 text-slate-600 font-black uppercase tracking-tighter print:bg-slate-200 print:text-black">
                                    <th className="py-2 px-4 text-left border print:border-black w-24">Lantai</th>
                                    <th className="py-2 px-4 text-left border print:border-black">Nama Ruangan</th>
                                    <th className="py-2 px-4 text-center border print:border-black">Zona</th>
                                    <th className="py-2 px-4 text-center border print:border-black">Jml</th>
                                    <th className="py-2 px-4 text-center border print:border-black">Luas (m²)</th>
                                    <th className="py-2 px-4 text-left border print:border-black">Keterangan</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {b.floors.map((f) => (
                                    <React.Fragment key={f.id}>
                                        {(() => {
                                        let displayRooms = rooms.filter(r => r.floorId === f.id);
                                        if (reportSortBy === 'name') displayRooms = [...displayRooms].sort((a, b) => a.label.localeCompare(b.label));
                                        else if (reportSortBy === 'zone') displayRooms = [...displayRooms].sort((a, b) => { const zA = zones.find(z=>z.id===a.zoneId)?.label||''; const zB = zones.find(z=>z.id===b.zoneId)?.label||''; return zA.localeCompare(zB); });
                                        
                                        if (displayRooms.length === 0) {
                                            return (
                                                <tr className="border-b border-slate-100 print:border-slate-300">
                                                    <td className="py-2 px-4 font-black text-slate-700 bg-slate-50 border-x border-slate-100 print:border-slate-300 align-top w-24">{f.name}</td>
                                                    <td colSpan={5} className="py-2 px-4 text-center text-slate-400 italic border-x border-slate-100 print:border-slate-300">Belum ada ruangan</td>
                                                </tr>
                                            );
                                        }

                                        return displayRooms.map((room, idx) => {
                                            const z = zones.find(z => z.id === room.zoneId) || zones[0];
                                            return (
                                            <tr key={room.id} className="border-b border-slate-100 print:border-slate-300">
                                                {idx === 0 && (
                                                    <td rowSpan={displayRooms.length} className="py-2 px-4 font-black text-slate-700 bg-slate-50 border-x border-slate-100 print:border-slate-300 align-top w-24">
                                                        {f.name}
                                                    </td>
                                                )}
                                                <td className="py-2 px-4 font-medium border-x border-slate-100 print:border-slate-300">{room.label}</td>
                                                <td className="py-2 px-4 text-center border-x border-slate-100 print:border-slate-300"><span className={`px-2 py-0.5 rounded-full text-[8px] font-black uppercase print:border print:border-slate-400 print:bg-transparent print:text-black ${getZoneStyle(z.colorId).color}`}>{z.label}</span></td>
                                                <td className="py-2 px-4 text-center border-x border-slate-100 print:border-slate-300">{room.count}</td>
                                                <td className="py-2 px-4 text-center font-bold border-x border-slate-100 print:border-slate-300">{((Number(room.count) || 0) * (Number(room.std) || 0)).toFixed(1)}</td>
                                                <td className="py-2 px-4 text-left text-[10px] text-slate-500 italic max-w-[120px] truncate border-x border-slate-100 print:border-slate-300">{room.notes || '-'}</td>
                                            </tr>
                                            );
                                        });
                                        })()}
                                        {factors.map(fac => {
                                        const rawValue = f.factorValues?.[fac.id] !== undefined ? f.factorValues[fac.id] : '';
                                        const facValue = Number(rawValue) || 0; const facArea = (f.netto * facValue) / 100;
                                        return (
                                            <tr key={`${f.id}-${fac.id}`} className="text-[10px] bg-white text-slate-500 border border-slate-50 print:border-slate-300 print:text-black">
                                            <td className="border-r border-slate-50 print:border-slate-300"></td>
                                            <td className="border-r border-slate-50 print:border-slate-300"></td>
                                            <td className="py-1 px-4 text-center italic border-r border-slate-50 print:border-slate-300">+ {fac.label}</td>
                                            <td className="py-1 px-4 text-center italic border-r border-slate-50 print:border-slate-300">{facValue}%</td>
                                            <td className="py-1 px-4 text-center font-medium border-r border-slate-50 print:border-slate-300">{facArea.toFixed(1)} m²</td>
                                            <td></td>
                                            </tr>
                                        );
                                        })}
                                        <tr className="text-[10px] bg-slate-50 text-slate-600 font-bold border border-slate-200 print:border-black print:bg-white print:text-black">
                                        <td colSpan={4} className="py-2 px-4 text-right uppercase border-r border-slate-200 print:border-black">Subtotal Netto {f.name} <span className="normal-case italic opacity-75">(tanpa luasan faktor tambahan)</span></td>
                                        <td className="py-2 px-4 text-center font-black border-r border-slate-200 print:border-black">{f.netto.toFixed(1)} m²</td>
                                        <td></td>
                                        </tr>
                                        <tr className="text-[10px] bg-indigo-50 text-indigo-900 font-black border border-indigo-100 print:bg-slate-100 print:border-black print:text-black">
                                        <td colSpan={4} className="py-2.5 px-4 text-right uppercase border-r border-indigo-100 print:border-black">Total Luas Bruto {f.name}</td>
                                        <td className="py-2.5 px-4 text-center border-r border-indigo-100 print:border-black">{f.bruto.toFixed(1)} m²</td>
                                        <td></td>
                                        </tr>
                                    </React.Fragment>
                                    ))}
                                    <tr className="text-[11px] bg-slate-800 text-white font-black border border-slate-800 print:bg-slate-200 print:border-black print:text-black">
                                        <td colSpan={4} className="py-3 px-4 text-right uppercase border-r border-slate-700 print:border-black">TOTAL GFA {b.name}</td>
                                        <td className="py-3 px-4 text-center text-sm border-r border-slate-700 print:border-black">{b.bruto.toFixed(1)} m²</td>
                                        <td className="py-3 px-4 text-left opacity-80">Footprint: {b.footprint.toFixed(1)} m²</td>
                                    </tr>
                                </tbody>
                                </table>
                            </div>
                        ))}

                        {/* REKAPITULASI AKHIR MASTERPLAN */}
                        <div className="grid grid-cols-2 gap-4 mt-8 print:break-inside-avoid border-t-4 border-slate-900 pt-8">
                          <div className="p-4 bg-slate-50 rounded-xl border border-slate-200 print:bg-white print:border-black">
                            <p className="text-[10px] font-black text-slate-400 uppercase mb-3 print:text-black">Perhitungan Intensitas Lahan</p>
                            <div className="space-y-2 text-xs">
                              <div className="flex justify-between border-b border-slate-100 pb-1 print:border-slate-300"><span>Luas Lahan</span> <span className="font-bold">{landArea} m²</span></div>
                              <div className="flex justify-between border-b border-slate-100 pb-1 print:border-slate-300"><span>KDB Gabungan (Maks. {kdbLimit}%)</span> <span className={`font-black ${stats.currentKDB > (Number(kdbLimit)||0) ? 'text-rose-600 print:text-black' : ''}`}>{stats.currentKDB.toFixed(1)}%</span></div>
                              <div className="flex justify-between border-b border-slate-100 pb-1 print:border-slate-300"><span>KTB Gabungan (Maks. {ktbLimit}%)</span> <span className={`font-black ${stats.currentKTB > (Number(ktbLimit)||0) ? 'text-rose-600 print:text-black' : ''}`}>{stats.currentKTB.toFixed(1)}%</span></div>
                              <div className="flex justify-between border-b border-slate-100 pb-1 print:border-slate-300"><span>KDH (Min. {kdhLimit}%)</span> <span className="font-bold text-emerald-600 print:text-black">≥ {stats.minRequiredKDHArea.toFixed(1)} m²</span></div>
                              <div className="flex justify-between border-b border-slate-100 pb-1 print:border-slate-300"><span>KLB Kawasan (Maks. {klbLimit})</span> <span className={`font-black ${stats.currentKLB > (Number(klbLimit)||0) ? 'text-rose-600 print:text-black' : ''}`}>{stats.currentKLB.toFixed(2)}</span></div>
                            </div>
                          </div>
                          <div className="p-4 bg-slate-900 rounded-xl text-white print:bg-white print:text-black print:border print:border-black">
                            <p className="text-[10px] font-black text-indigo-300 uppercase mb-3 print:text-black">Total Luas Bangunan</p>
                            <div className="space-y-2 text-xs">
                              <div className="flex justify-between border-b border-slate-700 pb-1 print:border-slate-300"><span>Total Luas Netto</span> <span className="font-black text-white print:text-black">{stats.nettoTotal.toFixed(1)} m²</span></div>
                              <div className="flex justify-between border-b border-slate-700 pb-1 print:border-slate-300"><span>Total Add. Factors</span> <span className="font-black text-white print:text-black">{Object.values(stats.factorAreas).reduce((a, b) => a + b, 0).toFixed(1)} m²</span></div>
                              <div className="flex justify-between text-lg font-black pt-2 mt-2 print:border-black"><span>TOTAL GFA</span> <span>{stats.brutoTotal.toFixed(1)} m²</span></div>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              {duplicateModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 print:hidden">
                  <div className="bg-white rounded-3xl shadow-2xl max-w-xs w-full p-6">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                      <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">{Copy && <Copy className="w-4 h-4 text-indigo-500" />} Duplikasi</h3>
                      <button onClick={() => setDuplicateModal({ isOpen: false, floorId: null, count: 1 })} className="text-slate-400 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 p-1.5 rounded-full transition-colors">{X && <X className="w-4 h-4" />}</button>
                    </div>
                    <p className="text-xs text-slate-500 mb-5 font-medium leading-relaxed">Tentukan berapa banyak salinan lantai ini yang ingin Anda buat secara instan.</p>
                    <div className="mb-6">
                      <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Jumlah Salinan Baru</label>
                      <input type="number" min="1" max={100} value={duplicateModal.count} onChange={(e) => setDuplicateModal(prev => ({ ...prev, count: parseInt(e.target.value) || 1 }))} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xl text-center font-black text-indigo-600 focus:ring-2 focus:ring-indigo-400 outline-none" autoFocus />
                    </div>
                    <div className="flex gap-2">
                      <button onClick={() => setDuplicateModal({ isOpen: false, floorId: null, count: 1 })} className="flex-1 py-3 rounded-xl text-xs font-black bg-slate-100 text-slate-600 hover:bg-slate-200 uppercase tracking-widest">Batal</button>
                      <button onClick={confirmDuplicate} className="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white hover:bg-indigo-700 uppercase tracking-widest shadow-lg shadow-indigo-200">Gandakan</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL DUPLIKASI GEDUNG */}
              {duplicateBuildingModal.isOpen && (
                <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 print:hidden">
                  <div className="bg-white rounded-3xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                      <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                        {Copy && <Copy className="w-4 h-4 text-indigo-500" />} Duplikasi Gedung
                      </h3>
                      <button onClick={() => setDuplicateBuildingModal({ isOpen: false, buildingId: null, count: 1 })} className="text-slate-400 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 p-1.5 rounded-full transition-colors">{X && <X className="w-4 h-4" />}</button>
                    </div>
                    
                    <p className="text-xs text-slate-500 mb-5 font-medium leading-relaxed">
                      Buat salinan identik dari gedung ini beserta seluruh lantai dan ruangannya.
                    </p>
                    
                    <div className="mb-6">
                      <label className="text-[10px] font-black text-slate-400 uppercase block mb-2">Jumlah Salinan Gedung</label>
                      <input 
                        type="number" 
                        min="1" max={20}
                        value={duplicateBuildingModal.count}
                        onChange={(e) => setDuplicateBuildingModal(prev => ({ ...prev, count: parseInt(e.target.value) || 1 }))}
                        className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xl text-center font-black text-indigo-600 focus:ring-2 focus:ring-indigo-400 outline-none transition-shadow"
                        autoFocus
                      />
                    </div>
                    
                    <div className="flex gap-2">
                      <button onClick={() => setDuplicateBuildingModal({ isOpen: false, buildingId: null, count: 1 })} className="flex-1 py-3 rounded-xl text-xs font-black bg-slate-100 text-slate-600 hover:bg-slate-200 uppercase tracking-widest">Batal</button>
                      <button onClick={confirmDuplicateBuilding} className="flex-1 py-3 rounded-xl text-xs font-black bg-indigo-600 text-white hover:bg-indigo-700 uppercase tracking-widest shadow-lg shadow-indigo-200">Gandakan</button>
                    </div>
                  </div>
                </div>
              )}

              {/* MODAL DIALOG UMUM */}
              {dialog.isOpen && (
                <div className="fixed inset-0 z-50 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 print:hidden">
                  <div className="bg-white rounded-3xl shadow-2xl max-w-xs w-full p-6 animate-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center mb-4 border-b border-slate-100 pb-3">
                      <h3 className="text-sm font-black text-slate-800 uppercase tracking-widest flex items-center gap-2">
                        {dialog.type === 'alert' ? (AlertTriangle && <AlertTriangle className="w-4 h-4 text-amber-500" />) : (Info && <Info className="w-4 h-4 text-indigo-500" />)}
                        {dialog.title}
                      </h3>
                      <button onClick={() => setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null })} className="text-slate-400 hover:text-rose-500 bg-slate-50 hover:bg-rose-50 p-1.5 rounded-full transition-colors">{X && <X className="w-4 h-4" />}</button>
                    </div>
                    <p className="text-xs text-slate-600 mb-6 font-medium leading-relaxed">{dialog.message}</p>
                    <div className="flex gap-2">
                      {dialog.type === 'confirm' && (
                          <button onClick={() => setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null })} className="flex-1 py-3 rounded-xl text-xs font-black bg-slate-100 text-slate-600 hover:bg-slate-200 uppercase tracking-widest">Batal</button>
                      )}
                      <button
                          onClick={() => {
                              if (dialog.onConfirm) dialog.onConfirm();
                              setDialog({ isOpen: false, title: '', message: '', type: 'alert', onConfirm: null });
                          }}
                          className={`flex-1 py-3 rounded-xl text-xs font-black text-white uppercase tracking-widest shadow-lg ${dialog.type === 'confirm' ? 'bg-rose-600 hover:bg-rose-700 shadow-rose-200' : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-200'}`}
                      >
                          {dialog.type === 'confirm' ? 'Lanjutkan' : 'Mengerti'}
                      </button>
                    </div>
                  </div>
                </div>
              )}
            </div>
          );
        };

        // Render aplikasi di dalam Error Boundary
        const root = window.ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
